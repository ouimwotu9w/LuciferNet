async function launchEvent(){
  const type=document.getElementById('ev-type')?.value;
  const dur=parseInt(document.getElementById('ev-dur')?.value)||3600000;
  const title=document.getElementById('ev-title')?.value?.trim();
  const checkedGames=[...document.querySelectorAll('#ev-games-check input:checked')].map(cb=>cb.value);
  if(!checkedGames.length){showToast('اختر لعبة واحدة على الأقل!','warning');return;}
  const ptype=document.getElementById('ev-ptype')?.value||'';
  const pvalue=document.getElementById('ev-pvalue')?.value||'';
  const prizeLabels={lord_eater:'🔮 ثيم Lord Eater',defender:'🛡️ ثيم The Defender',void:'🌌 ثيم Void',inferno:'🔥 ثيم Inferno',he_above:'🌿 ثيم HE IS ABOVE US',chosen:'✦ ثيم Chosen',him:'👑 ثيم HIM',fire:'🔥 رانك Fire',ice:'❄️ رانك Ice',end:'💀 رانك The End Is Near'};
  const et=EVENT_TYPES[type];
  const gameNames=checkedGames.map(id=>GAMES_LIST.find(g=>g.id===id)?.name||id).join(' + ');
  const evTitle=title||(et.name+' — '+gameNames);
  try{
    await addDoc(collection(db,'events'),{
      type,gameIds:checkedGames,gameId:checkedGames[0],title:evTitle,
      prizeType:ptype,prizeValue:pvalue,prizeLabel:pvalue?prizeLabels[pvalue]:'',
      status:'active',endTime:Date.now()+dur,winners:[],createdBy:currentUserData.uid,createdAt:serverTimestamp()
    });
    await push(ref(rtdb,'public_chat'),{
      text:`🎮🔥 انطلقت ${et.name}: "${evTitle}"!\nالألعاب: ${gameNames}${pvalue?'\n🎁 الجائزة: '+prizeLabels[pvalue]:''}\nاذهب لقسم الفعاليات الآن! 🏆`,
      uid:'system',name:'🤖 النظام',nickname:'النظام',avatar:'',reactions:{},timestamp:Date.now()
    });
    try{await set(ref(rtdb,'event_announcement'),{title:evTitle,gameName:gameNames,prize:pvalue?prizeLabels[pvalue]:'',timestamp:Date.now(),id:Date.now()});setTimeout(async()=>{try{await remove(ref(rtdb,'event_announcement'));}catch(e){}},30000);}catch(e){}
    showToast('✅ تم إطلاق الفعالية!','success');loadAdminEventsList();
  }catch(e){showToast('خطأ: '+e.message,'error');}
}

async function loadAdminEventsList(){
  const el=document.getElementById('admin-events-list'); if(!el) return;
  const snap=await getDocs(query(collection(db,'events'),orderBy('createdAt','desc'),limit(20)));
  if(snap.empty){el.innerHTML='<div class="empty-state">لا توجد فعاليات</div>';return;}
  el.innerHTML='';
  snap.forEach(d=>{
    const ev={id:d.id,...d.data()};
    const game=GAMES_LIST.find(g=>g.id===ev.gameId);
    const div=document.createElement('div');div.className='card';div.style.marginBottom='8px';
    div.innerHTML=`<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <div style="flex:1;">
        <div style="font-weight:700;">${esc(ev.title||'فعالية')}</div>
        <div style="font-size:11px;color:var(--text2);">${game?.name||ev.gameId} | ${ev.status==='active'?'🟢 نشطة':'⏹ منتهية'} | فائز: ${esc(ev.winnerName||'لا يوجد')}</div>
      </div>
      <button class="btn-danger btn-xs" data-endev="${ev.id}">⏹ إنهاء</button>
      <button class="btn-ghost btn-xs" data-delev="${ev.id}">🗑</button>
    </div>`;
    el.appendChild(div);
  });
  // Event delegation
  if(!el.dataset.delegated){
    el.dataset.delegated='1';
    el.addEventListener('click', async e=>{
      const end=e.target.closest('[data-endev]');
      if(end){await endEvent(end.dataset.endev);return;}
      const del=e.target.closest('[data-delev]');
      if(del){await deleteEvent(del.dataset.delev);return;}
    });
  }
}
async function endEvent(id){await updateDoc(doc(db,'events',id),{status:'ended'});showToast('✅ انتهت الفعالية','success');loadAdminEventsList();}
async function deleteEvent(id){await deleteDoc(doc(db,'events',id));loadAdminEventsList();}

async function getUidFromTarget(tid,ttype){
  if(ttype==='user') return tid;
  if(ttype==='post'){const s=await getDoc(doc(db,'posts',tid));return s.data()?.authorId;}
  const s=await get(ref(rtdb,'public_chat/'+tid));
  if(s.exists()) return s.val().uid;
  return null;
}

async function muteFromReport(tid,ttype,rid,mins){
  const uid=await getUidFromTarget(tid,ttype);
  if(!uid){showToast('تعذر تحديد المستخدم','error');return;}
  const until=new Date(Date.now()+mins*60*1000);
  await updateDoc(doc(db,'users',uid),{muteUntil:until});
  await updateDoc(doc(db,'reports',rid),{status:'actioned',action:`mute_${mins}min`,targetUid:uid});
  showToast(`✅ تم الميوت لـ ${mins} دقيقة`,'success');
  loadAdminReports();
}

async function banFromReport(tid,ttype,rid,dur){
  const uid=await getUidFromTarget(tid,ttype);
  if(!uid){showToast('تعذر تحديد المستخدم','error');return;}
  const uSnap=await getDoc(doc(db,'users',uid));
  const fp=uSnap.data()?.fingerprint;
  if(!fp){showToast('لا يوجد fingerprint','error');return;}
  const bd=dur==='forever'
    ?{uid,permanent:true,bannedAt:new Date().toISOString()}
    :{uid,permanent:false,until:new Date(Date.now()+30*24*60*60*1000).toISOString()};
  await setDoc(doc(db,'banned_fingerprints',fp),bd);
  await updateDoc(doc(db,'users',uid),{banned:true});
  await updateDoc(doc(db,'reports',rid),{status:'actioned',action:'ban_'+dur});
  showToast('✅ تم الحظر','success'); loadAdminReports();
}

async function falseClaim(reportedBy,rid){
  if(!reportedBy) return;
  await updateDoc(doc(db,'users',reportedBy),{muteUntil:new Date(Date.now()+15*60*1000)});
  await updateDoc(doc(db,'reports',rid),{status:'false_claim'});
  showToast('✅ تم ميوت المبلغ 15 دقيقة','success'); loadAdminReports();
}
async function dismissReport(rid){ await updateDoc(doc(db,'reports',rid),{status:'dismissed'}); loadAdminReports(); }

// Mute management
async function extendMute(uid,addMins){
  const snap=await getDoc(doc(db,'users',uid)); const u=snap.data();
  const cur=u.muteUntil?(u.muteUntil.toDate?u.muteUntil.toDate():new Date(u.muteUntil)):new Date();
  const newUntil=new Date(Math.max(cur,new Date())+addMins*60*1000);
  await updateDoc(doc(db,'users',uid),{muteUntil:newUntil});
  showToast('✅ تم تمديد الكتم','success');
  // Notify user via RTDB
  await set(ref(rtdb,'notifications/'+uid),{type:'mute_extended',msg:'السيد لوسيفر يصب عليك جام غضبه',at:Date.now()});
  loadPunishedUsers();
}

async function liftMute(uid){
  await updateDoc(doc(db,'users',uid),{muteUntil:null});
  showToast('✅ تم رفع الكتم','success');
  await set(ref(rtdb,'notifications/'+uid),{type:'mute_lifted',msg:'السيد لوسيفر صفح عنك',at:Date.now()});
  loadPunishedUsers();
}

async function extendBan(fp,addDays){
  const snap=await getDoc(doc(db,'banned_fingerprints',fp)); const d=snap.data();
  const cur=d.until?new Date(d.until):new Date();
  const newUntil=new Date(Math.max(cur,new Date())+addDays*24*60*60*1000);
  await updateDoc(doc(db,'banned_fingerprints',fp),{until:newUntil.toISOString(),permanent:false});
  // Try to find uid for notification
  if(d.uid) await set(ref(rtdb,'notifications/'+d.uid),{type:'ban_extended',msg:'السيد لوسيفر يصب عليك جام غضبه',at:Date.now()});
  showToast('✅ تم تمديد الحظر','success'); loadPunishedUsers();
}

async function makeBanForever(fp){
  await updateDoc(doc(db,'banned_fingerprints',fp),{permanent:true});
  showToast('☠️ تم تحويل الحظر لأبدي','success'); loadPunishedUsers();
}

async function liftBan(fp,uid){
  await deleteDoc(doc(db,'banned_fingerprints',fp));
  if(uid) await updateDoc(doc(db,'users',uid),{banned:false});
  showToast('✅ تم رفع الحظر','success'); loadPunishedUsers();
}

let schImgB64=null;
function previewSchImg(inp){
  const f=inp.files[0]; if(!f) return;
  const rd=new FileReader(); rd.onload=e=>{
    schImgB64=e.target.result;
    document.getElementById('sch-img-prev').innerHTML=`<img src="${schImgB64}" style="max-height:80px;border-radius:8px;margin-bottom:8px;">`;
  }; rd.readAsDataURL(f);
}
async function schedulePost(){
  const text=document.getElementById('sch-text')?.value?.trim();
  const timeStr=document.getElementById('sch-time')?.value;
  if(!text&&!schImgB64){showToast('اكتب نصاً أو أضف صورة','warning');return;}
  if(!timeStr){showToast('اختر التاريخ والوقت','warning');return;}
  const scheduledFor=new Date(timeStr).getTime();
  if(scheduledFor<=Date.now()){showToast('الوقت يجب أن يكون في المستقبل','warning');return;}
  await addDoc(collection(db,'scheduled_posts'),{
    text:text||'',imageB64:schImgB64||'',scheduledFor,
    authorId:currentUserData.uid,authorName:currentUserData.name,
    authorNickname:currentUserData.nickname,authorAvatar:currentUserData.avatar||'',
    authorTheme:currentUserData.theme||'default',status:'pending',createdAt:serverTimestamp()
  });
  document.getElementById('sch-text').value='';document.getElementById('sch-time').value='';
  schImgB64=null;document.getElementById('sch-img-prev').innerHTML='';
  showToast('✅ تم جدولة المنشور','success');loadScheduledPosts();
  // Schedule check
  const delay=scheduledFor-Date.now();
  setTimeout(()=>publishScheduledPost(),Math.min(delay,2147483647));
}
async function publishScheduledPost(){
  const now=Date.now();
  const snap=await getDocs(query(collection(db,'scheduled_posts'),where('status','==','pending'),where('scheduledFor','<=',now)));
  for(const d of snap.docs){
    const p=d.data();
    await addDoc(collection(db,'posts'),{
      text:p.text,imageB64:p.imageB64||'',authorId:p.authorId,authorName:p.authorName,
      authorNickname:p.authorNickname,authorAvatar:p.authorAvatar,authorTheme:p.authorTheme,
      reactions:{},commentCount:0,pinned:false,createdAt:serverTimestamp()
    });
    await updateDoc(d.ref,{status:'published'});
  }
}

  const el=document.getElementById('sch-list'); if(!el) return;

    el.appendChild(div);

function watchPlatformMode(){
  onValue(ref(rtdb,'platform_mode'),async snap=>{
    const mode=snap.val()||'normal';
    if(mode==='maintenance'&&currentUserData?.role!=='admin'){
      const msgSnap=await get(ref(rtdb,'maintenance_message'));
      const msg=msgSnap.val()||'المنصة تحت الصيانة، سنعود قريباً! ⚙️';
      showMaintenanceScreen(msg);
    } else {
      const ms=document.getElementById('maintenance-screen');if(ms)ms.remove();
    }
    if(mode==='readonly') window._readOnly=true; else window._readOnly=false;
  });
}
function showMaintenanceScreen(msg){
  let s=document.getElementById('maintenance-screen');
  if(!s){s=document.createElement('div');s.id='maintenance-screen';}
  s.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;z-index:999990;background:#000;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;';
  s.innerHTML=`
    <div style="font-size:80px;animation:pulse-glow 2s ease-in-out infinite;margin-bottom:20px;">⚙️</div>
    <div style="font-family:'Cinzel Decorative',serif;font-size:clamp(20px,5vw,40px);color:#f4a261;margin-bottom:16px;">صيانة مؤقتة</div>
    <div style="font-size:16px;color:#888;max-width:400px;line-height:1.8;">${esc(msg)}</div>
    <div style="margin-top:30px;font-size:12px;color:#444;">⚡ LuciferNet</div>`;
  document.body.appendChild(s);
}

async function grantPrizeByEmail(){
  const email=document.getElementById('prize-email')?.value?.trim();
  const prizeId=document.getElementById('prize-select')?.value;
  if(!email||!prizeId){showToast('أدخل البريد والجائزة','warning');return;}
  const snap=await getDocs(query(collection(db,'users'),where('email','==',email),limit(1)));
  if(snap.empty){showToast('مستخدم غير موجود','error');return;}
  const uid=snap.docs[0].data().uid;
  const prize=EVENT_PRIZES.find(p=>p.id===prizeId);
  // Temporarily set currentUserData to target for givePrize
  const savedMe=currentUserData;
  currentUserData={...snap.docs[0].data()};
  await givePrize(prize);
  currentUserData=savedMe;
  showToast(`✅ منحت ${prize?.name} لـ ${email}`,'success');
}

async function resetAllEventPoints(){
  if(!confirm('إعادة تعيين كل نقاط الفعاليات؟')) return;
  const snap=await getDocs(collection(db,'event_points'));
  for(const d of snap.docs) await deleteDoc(d.ref);
  showToast('✅ تم إعادة تعيين النقاط','success');
}
async function grantAllThemes(){
  if(!confirm('منح كل الثيمات لجميع المستخدمين؟')) return;
  const snap=await getDocs(collection(db,'users'));
  for(const d of snap.docs){
    const perms=d.data().permissions||{};
    for(const th of Object.keys(builtinThemes)) perms[th+'_unlocked']=true;
    await updateDoc(d.ref,{permissions:perms});
  }
  showToast('✅ منحت كل الثيمات للجميع','success');
}
async function announceWinner(){
  const name=prompt('اسم الفائز:'); if(!name) return;

  await push(ref(rtdb,'public_chat'),{
    text:`🏆🎉 تهانينا لـ ${name} على الفوز بـ ${prize}! 🎉🏆`,
    uid:'system',name:'🤖 النظام',nickname:'النظام',avatar:'',reactions:{},timestamp:Date.now()

}
async function wipeEventHistory(){

  return `<div class="theme-card${ok?'':' locked'}" onclick="${ok?`selectTheme('${id}')`:'showToast(\"🔒 هذا الثيم مقفل\",\"warning\")'}">

function getCustomThemeValues(){
  const g=id=>document.getElementById(id)?.value||'';
  return {
    '--bg':g('ct-bg'),'--bg2':g('ct-bg2'),'--bg3':g('ct-bg3'),
    '--accent':g('ct-acc'),'--accent2':g('ct-acc'),
    '--text':g('ct-text'),'--text2':g('ct-text2'),
    '--border':g('ct-border'),
    '--glow':`${g('ct-acc')}55`,
    '--font-main':document.getElementById('ct-font')?.value||"'Exo 2',sans-serif",
    '--font-brand':document.getElementById('ct-font-brand')?.value||"'Cinzel Decorative',serif"
  };
}

async function saveCustomTheme(){
  const name=document.getElementById('ct-name')?.value?.trim();
  if(!name){showToast('أدخل اسماً للثيم','warning');return;}
  loadCustomThemes();
  customThemes[name]=getCustomThemeValues();
  saveCustomThemes();
  await selectTheme(name);
  showToast(`✅ تم حفظ ثيم "${name}"`,'success');
  renderThemes();
}

function deleteCustomTheme(id){
  loadCustomThemes();
  delete customThemes[id];
  saveCustomThemes();
  if(currentTheme===id) selectTheme('default');
  renderThemes();
}

async function selectTheme(name){
  applyThemeWithFX(name);
  if(currentUserData){
    currentUserData.theme=name;
    await updateDoc(doc(db,'users',currentUserData.uid),{theme:name});
  }
  renderThemes();
}

function showAuthModal(mode='login'){
  const modal=document.getElementById('modal');
  if(!modal){console.error('modal not found!');return;}
  // Use data-mode on modal to track current mode
  modal.dataset.authMode = mode;
  modal.innerHTML=`
    <div class="modal-box auth-box">
      <div style="text-align:center;margin-bottom:10px;">
        <div style="font-family:'Cinzel Decorative',serif;font-size:28px;color:var(--accent);text-shadow:0 0 20px var(--glow);">⚡ LuciferNet</div>
        <div style="font-size:12px;color:var(--text2);margin-top:4px;">السيطرة الكاملة</div>
      </div>
      <div class="auth-tabs">
        <button class="auth-tab-btn ${mode==='login'?'tab-active':'tab-inactive'}" data-authmode="login">دخول</button>
        <button class="auth-tab-btn ${mode==='register'?'tab-active':'tab-inactive'}" data-authmode="register">حساب جديد</button>
      </div>
      ${mode==='login'?`
        <input type="email" id="auth-email" placeholder="البريد الإلكتروني" class="input-field" autocomplete="email">
        <input type="password" id="auth-password" placeholder="كلمة المرور" class="input-field" autocomplete="current-password">
        <button class="auth-action-btn btn-primary btn-full">دخول</button>
        <button class="auth-reset-btn btn-ghost btn-sm" style="width:100%;margin-top:4px;">نسيت كلمة المرور؟</button>
      `:`
        <input type="text" id="auth-name" placeholder="الاسم الكامل" class="input-field">
        <input type="text" id="auth-nick" placeholder="Nickname (اختياري)" class="input-field">
        <input type="email" id="auth-email" placeholder="البريد الإلكتروني" class="input-field" autocomplete="email">
        <input type="password" id="auth-password" placeholder="كلمة المرور" class="input-field" autocomplete="new-password">
        <button class="auth-action-btn btn-primary btn-full">إنشاء الحساب</button>
      `}
      <div id="auth-error" style="color:#e63946;font-size:13px;min-height:20px;text-align:center;margin-top:8px;"></div>
    </div>`;
  modal.style.display='flex';
  // Single delegated listener on modal-box (never gets lost on re-render)
  modal.querySelector('.auth-box').addEventListener('click', async e=>{
    const curMode = modal.dataset.authMode;
    // Tab switch
    if(e.target.classList.contains('auth-tab-btn')){
      showAuthModal(e.target.dataset.authmode);
      return;
    }
    // Action button (login or register)
    if(e.target.classList.contains('auth-action-btn')){
      const errEl=document.getElementById('auth-error');
      const email=document.getElementById('auth-email')?.value?.trim();
      const pass=document.getElementById('auth-password')?.value;
      if(!email||!pass){if(errEl)errEl.textContent='يرجى ملء جميع الحقول';return;}
      e.target.disabled=true; e.target.textContent='جاري...';
      try{
        console.log('🔐 بدء ' + curMode + ' للـ email:', email);
        if(curMode==='login'){
          console.log('📡 بنكلم Firebase loginUser...');
          await loginUser(email,pass);
          console.log('✅ loginUser نجحت — بننتظر onAuthStateChanged');
        } else {
          const name=document.getElementById('auth-name')?.value?.trim();
          const nick=document.getElementById('auth-nick')?.value?.trim();
          if(!name){if(errEl)errEl.textContent='يرجى إدخال الاسم';return;}
          console.log('📡 بنكلم Firebase registerUser...');
          await registerUser(email,pass,name,nick);
          console.log('✅ registerUser نجحت');
        }
      }catch(ex){
        console.error('❌ Auth error:', ex.code, ex.message);
        if(errEl)errEl.textContent=ex.message||'حدث خطأ، حاول مجددًا';
        e.target.disabled=false;
        e.target.textContent=curMode==='login'?'دخول':'إنشاء الحساب';
      }
      return;
    }
    // Reset password
    if(e.target.classList.contains('auth-reset-btn')){
      const email=document.getElementById('auth-email')?.value?.trim();
      if(!email){document.getElementById('auth-error').textContent='أدخل البريد أولاً';return;}
      try{await sendPasswordResetEmail(auth,email);showToast('✅ تم إرسال رابط إعادة التعيين','success');}
      catch(ex){document.getElementById('auth-error').textContent=ex.message;}
      return;
    }
    // Close on backdrop
    if(e.target===modal)closeModal();
  });
  modal.addEventListener('click',e=>{if(e.target===modal)closeModal();},{once:false});
  // Enter key
  modal.querySelector('#auth-password')?.addEventListener('keypress',e=>{
    if(e.key==='Enter') modal.querySelector('.auth-action-btn')?.click();
  });
}
async function doLogin(){
  const e=document.getElementById('auth-email')?.value?.trim();
  const p=document.getElementById('auth-password')?.value;
  const err=document.getElementById('auth-error');
  if(!e||!p){if(err)err.textContent='يرجى ملء جميع الحقول';return;}
  try{await loginUser(e,p);}catch(ex){if(err)err.textContent=ex.message;}

  const name=document.getElementById('auth-name')?.value?.trim();

// ══ HE IS ABOVE US PARTICLES ══
let _heAboveAnimId=null;
let _heAboveCanvas=null;
function startHeAboveParticles(){
  stopHeAboveParticles();
  const cv=document.createElement('canvas');
  cv.id='_he-above-cv';
  cv.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;';
  document.body.prepend(cv);
  _heAboveCanvas=cv;
  const ctx=cv.getContext('2d');
  cv.width=window.innerWidth;cv.height=window.innerHeight;
  const W=cv.width,H=cv.height;
  // Matrix rain + floating particles
  const cols=Math.floor(W/16);
  const drops=Array(cols).fill(0).map(()=>Math.random()*H/16|0);
  const chars='01アイウエオカキクケコサシスセソタチツテト♦◈⬡⬢◉⊕'.split('');
  // Floating glowing orbs
  const orbs=Array(22).fill(0).map(()=>({
    x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*0.5,vy:(Math.random()-.5)*0.5,
    r:Math.random()*4+2,alpha:Math.random()*0.6+0.3,pulse:Math.random()*Math.PI*2
  }));
  let frame=0;
  const draw=()=>{
    frame++;
    _heAboveAnimId=requestAnimationFrame(draw);
    ctx.fillStyle='rgba(0,0,0,0.055)';
    ctx.fillRect(0,0,W,H);
    // Matrix rain
    ctx.font='13px monospace';
    drops.forEach((y,i)=>{
      const ch=chars[Math.floor(Math.random()*chars.length)];
      const bright=Math.random()>.97;
      ctx.fillStyle=bright?'rgba(200,255,200,0.9)':'rgba(0,255,65,'+(0.2+Math.random()*0.35)+')';
      ctx.fillText(ch,i*16,y*16);
      drops[i]=(y*16>H&&Math.random()>.96)?0:y+1;
    });
    // Glowing orbs
    orbs.forEach(o=>{
      o.x+=o.vx;o.y+=o.vy;o.pulse+=0.03;
      if(o.x<0||o.x>W)o.vx*=-1;if(o.y<0||o.y>H)o.vy*=-1;
      const a=(Math.sin(o.pulse)+1)/2*o.alpha;
      const grd=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r*4);
      grd.addColorStop(0,'rgba(0,255,65,'+a+')');
      grd.addColorStop(1,'rgba(0,255,65,0)');
      ctx.beginPath();ctx.arc(o.x,o.y,o.r*4,0,Math.PI*2);
      ctx.fillStyle=grd;ctx.fill();
    });
    // Scanning line
    const scanY=(frame*0.8)%H;
    ctx.strokeStyle='rgba(0,255,65,0.15)';
    ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,scanY);ctx.lineTo(W,scanY);ctx.stroke();
  };
  draw();
  const ro=new ResizeObserver(()=>{cv.width=window.innerWidth;cv.height=window.innerHeight;});
  ro.observe(document.body);
}
function stopHeAboveParticles(){
  if(_heAboveAnimId){cancelAnimationFrame(_heAboveAnimId);_heAboveAnimId=null;}
  const cv=document.getElementById('_he-above-cv');if(cv)cv.remove();
  _heAboveCanvas=null;
}

async function addMod(){

  const uid=snap.docs[0].id;
  const perms={canUseCommands:true};
  if(role==='co-admin')perms.canUseConsole=true;
  await updateDoc(doc(db,'users',uid),{role,permissions:perms,...(rank?{rank}:{})});

function onChatInput(e){
  const val=e.target.value;if(!val.startsWith('?')){_acHide();return;}
  const role=currentUserData?.role,perms=currentUserData?.permissions||{};

    if(cmd==='?رانك'){const f=Object.keys(RANK_CONFIGS).filter(r=>!typed||r.includes(typed)).map(r=>({icon:'🏅',label:r,value:r}));if(!_ac)_ac={stage:'arg1',cmd,items:f,sel:0};_ac.items=f;_acDraw();return;}
  }
  if(parts.length===3&&['?بان','?كتم'].includes(cmd)){
    const it=[{icon:'⏱️',label:'30د',value:'30'},{icon:'⌛',label:'ساعة',value:'60'},{icon:'🌅',label:'يوم',value:'1440'},{icon:'📅',label:'أسبوع',value:'10080'},{icon:'🗓️',label:'شهر',value:'43200'}];
    if(!_ac)_ac={stage:'arg2',cmd,arg1:parts[1],items:it,sel:0};_ac.items=it;_acDraw();return;
  }
  _acHide();
}

function onChatKeyDown(e){
  const box=document.getElementById('cmd-autocomplete');if(!box||box.style.display==='none'||!_ac)return;
  const items=_ac.items||[];if(!items.length)return;
  if(e.key==='Tab'||e.key==='ArrowDown'){e.preventDefault();_ac.sel=(_ac.sel+1)%items.length;_acDraw();}
  else if(e.key==='ArrowUp'){e.preventDefault();_ac.sel=(_ac.sel-1+items.length)%items.length;_acDraw();}
  else if(e.key==='Enter'&&items.length){e.preventDefault();window.acSel(_ac.sel);}
  else if(e.key==='Escape')_acHide();
}

const FRIEND_REQ_COOLDOWN = 5000;
let _lastFriendReq = 0;

async function sendFriendRequest(targetUid) {
  if (!currentUser) return;
  if (targetUid === currentUserData.uid) { showToast('لا يمكنك إضافة نفسك', 'warning'); return; }
  if (Date.now() - _lastFriendReq < FRIEND_REQ_COOLDOWN) return;
  _lastFriendReq = Date.now();
  try {
    // Check if already friends
    const already = await getDoc(doc(db, 'friends', currentUserData.uid, 'list', targetUid));
    if (already.exists()) { showToast('أنتم بالفعل أصدقاء!', 'info'); return; }
    // Check if request already sent
    const pending = await getDoc(doc(db, 'friend_requests', targetUid, 'incoming', currentUserData.uid));
    if (pending.exists()) { showToast('تم إرسال الطلب مسبقاً', 'info'); return; }
    // Send request
    const batch = writeBatch(db);
    batch.set(doc(db, 'friend_requests', targetUid, 'incoming', currentUserData.uid), {
      from: currentUserData.uid,
      fromName: currentUserData.nickname || currentUserData.name,
      fromAvatar: currentUserData.avatar || '',
      sentAt: serverTimestamp()
    });
    batch.set(doc(db, 'friend_requests', currentUserData.uid, 'outgoing', targetUid), {
      to: targetUid, sentAt: serverTimestamp()
    });
    await batch.commit();
    // Notify target
    await addDoc(collection(db, 'notifications'), {
      to: targetUid, type: 'friend_request',
      msg: `👥 ${currentUserData.nickname || currentUserData.name} أرسل لك طلب صداقة`,
      from: currentUserData.uid, read: false, createdAt: serverTimestamp()
    });
    showToast('✅ تم إرسال طلب الصداقة!', 'success');
    logActivity('friend_request', targetUid);
  } catch (e) { showToast('خطأ: ' + e.message, 'error'); }
}

async function acceptFriendRequest(fromUid) {
  const batch = writeBatch(db);
  const myUid = currentUserData.uid;
  const meta1 = { uid: fromUid, name: '', addedAt: serverTimestamp() };
  const meta2 = { uid: myUid, name: currentUserData.nickname || currentUserData.name, addedAt: serverTimestamp() };
  // Get friend's info
  const fDoc = await getDoc(doc(db, 'users', fromUid));
  if (fDoc.exists()) meta1.name = fDoc.data().nickname || fDoc.data().name || '';
  // Add to each other's friends list
  batch.set(doc(db, 'friends', myUid, 'list', fromUid), meta1);
  batch.set(doc(db, 'friends', fromUid, 'list', myUid), meta2);
  // Remove requests
  batch.delete(doc(db, 'friend_requests', myUid, 'incoming', fromUid));
  batch.delete(doc(db, 'friend_requests', fromUid, 'outgoing', myUid));
  await batch.commit();
  // Notify
  await addDoc(collection(db, 'notifications'), {
    to: fromUid, type: 'friend_accepted',
    msg: `✅ ${currentUserData.nickname || currentUserData.name} قبل طلب صداقتك!`,
    from: myUid, read: false, createdAt: serverTimestamp()
  });
  showToast('✅ تمت إضافة الصديق!', 'success');
  renderFriends();
}

async function rejectFriendRequest(fromUid) {
  const myUid = currentUserData.uid;
  await Promise.all([
    deleteDoc(doc(db, 'friend_requests', myUid, 'incoming', fromUid)),
    deleteDoc(doc(db, 'friend_requests', fromUid, 'outgoing', myUid))
  ]);
  showToast('تم رفض الطلب', 'info');
  renderFriends();
}

async function removeFriend(targetUid) {

async function _loadFriendRequests() {
  const el = document.getElementById('friend-requests-list'); if (!el) return;
  const snap = await getDocs(collection(db, 'friend_requests', currentUserData.uid, 'incoming'));
  if (snap.empty) { el.innerHTML = '<div class="empty-state" style="font-size:13px;">لا توجد طلبات</div>'; return; }
  el.innerHTML = '';
  snap.forEach(d => {
    const r = d.data();
    const div = document.createElement('div');
    div.style.cssText = 'display:flex;align-items:center;gap:12px;padding:10px;background:var(--bg3);border-radius:10px;margin-bottom:8px;';
    div.innerHTML = `${avatar(r.fromAvatar, r.fromName, 38)}
      <div style="flex:1;"><div style="font-weight:700;font-size:13px;">${esc(r.fromName)}</div>

      <button class="btn-ghost btn-xs" onclick="rejectFriendRequest('${d.id}')">✕</button>`;

async function _loadFriendsList() {
  const online = document.getElementById('friends-online-list');
  const all = document.getElementById('friends-all-list');
  if (!online || !all) return;
  const snap = await getDocs(collection(db, 'friends', currentUserData.uid, 'list'));
  if (snap.empty) {
    online.innerHTML = '<div class="empty-state" style="font-size:13px;">لا أصدقاء أونلاين</div>';
    all.innerHTML = '<div class="empty-state" style="font-size:13px;">لم تضف أصدقاء بعد<br><span style="font-size:11px;color:var(--text2);">ابحث عن مستخدمين واضغط + لإضافتهم</span></div>';
    return;
  }
  // Load user data for each friend
  const uids = snap.docs.map(d => d.id);
  const users = await Promise.all(uids.map(uid => getDoc(doc(db, 'users', uid))));
  const friends = users.map(d => d.exists() ? { uid: d.id, ...d.data() } : null).filter(Boolean);
  const onlineFriends = friends.filter(f => f.onlineAt && Date.now() - (f.onlineAt?.toMillis?.() || 0) < 300000);
  // Online
  if (onlineFriends.length) {
    online.innerHTML = onlineFriends.map(f => _friendCard(f, true)).join('');
  } else {
    online.innerHTML = '<div class="empty-state" style="font-size:13px;">لا أصدقاء أونلاين الآن</div>';
  }
  // All
  all.innerHTML = friends.map(f => _friendCard(f, false)).join('');
}

async function followUser(targetUid) {
  if (!currentUser || targetUid === currentUserData.uid) return;
  const ref1 = doc(db, 'follows', currentUserData.uid, 'following', targetUid);
  const ref2 = doc(db, 'follows', targetUid, 'followers', currentUserData.uid);
  const alr = await getDoc(ref1);
  if (alr.exists()) {
    // Unfollow
    await Promise.all([deleteDoc(ref1), deleteDoc(ref2)]);
    showToast('تم إلغاء المتابعة', 'info');
    return false;
  }
  const batch = writeBatch(db);
  batch.set(ref1, { uid: targetUid, followedAt: serverTimestamp() });
  batch.set(ref2, { uid: currentUserData.uid, name: currentUserData.nickname || currentUserData.name, followedAt: serverTimestamp() });
  await batch.commit();
  await addDoc(collection(db, 'notifications'), {
    to: targetUid, type: 'new_follower',
    msg: `👁️ ${currentUserData.nickname || currentUserData.name} بدأ يتابعك!`,
    from: currentUserData.uid, read: false, createdAt: serverTimestamp()
  });
  showToast('✅ تمت المتابعة!', 'success');
  return true;
}

async function isFollowing(targetUid) {
  if (!currentUser) return false;
  const snap = await getDoc(doc(db, 'follows', currentUserData.uid, 'following', targetUid));
  return snap.exists();
}

async function isFriend(targetUid) {
  if (!currentUser) return false;
  const snap = await getDoc(doc(db, 'friends', currentUserData.uid, 'list', targetUid));
  return snap.exists();
}

async function renderFollowingFeed() {
  document.getElementById('main-content').innerHTML = `
    <div class="section-header"><span>📌</span> منشورات المتابَعين</div>
    <div id="following-feed-list"><div class="empty-state">جار التحميل...</div></div>`;
  const followSnap = await getDocs(collection(db, 'follows', currentUserData.uid, 'following'));
  if (followSnap.empty) {
    document.getElementById('following-feed-list').innerHTML = '<div class="empty-state">لم تتابع أحداً بعد<br><span style="font-size:12px;color:var(--text2);">اضغط متابعة على أي مستخدم من صفحته</span></div>';
    return;
  }
  const uids = followSnap.docs.map(d => d.id);
  const postsSnap = await getDocs(query(collection(db, 'posts'), orderBy('createdAt', 'desc'), limit(50)));
  const posts = postsSnap.docs.filter(d => uids.includes(d.data().uid));
  const el = document.getElementById('following-feed-list');
  if (!posts.length) { el.innerHTML = '<div class="empty-state">لا منشورات جديدة من المتابَعين</div>'; return; }
  el.innerHTML = '';
  posts.forEach(d => el.appendChild(createPostEl({ id: d.id, ...d.data() })));
}

          onmouseover="this.style.background='var(--accent)33'" onmouseout="this.style.background='var(--bg3)'">${s}</button>`
      ).join('')}

  panel.querySelectorAll('.sticker-tab').forEach(btn => {

      panel.querySelectorAll('.sticker-tab').forEach(b => {
        b.style.background = 'transparent'; b.style.borderColor = 'transparent';

      btn.style.background = 'var(--accent)22'; btn.style.borderColor = 'var(--accent)';

  setTimeout(() => {

      if (!panel.contains(e.target) && e.target.id !== 'sticker-btn') {

async function sendStickerFromPicker(encodedSticker) {
  const sticker = decodeURIComponent(encodedSticker);
  document.getElementById('sticker-picker-panel')?.remove();
  _stickerPickerOpen = false;
  if (await isMuted()) return;
  try {
    await push(ref(rtdb, 'public_chat'), {
      text: sticker,
      isSticker: true,
      uid: currentUserData.uid,
      name: currentUserData.nickname || currentUserData.name,
      nickname: currentUserData.nickname || '',
      avatar: currentUserData.avatar || '',
      rank: currentUserData.rank || '',
      reactions: {},
      timestamp: Date.now()
    });
    incrementUserStat(currentUserData.uid, 'totalChatMsgs');
  } catch (e) { showToast('خطأ في إرسال الستيكر', 'error'); }
}

// 🎤 VOICE MESSAGES
// ══════════════════════════════════════════════════════════════════════
let _mediaRecorder = null;
let _audioChunks = [];
let _recordingTimer = null;
let _recordingSeconds = 0;

async function startVoiceRecord() {
  if (_mediaRecorder && _mediaRecorder.state === 'recording') {
    stopVoiceRecord(); return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    _audioChunks = [];
    _mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
    _mediaRecorder.ondataavailable = e => { if (e.data.size > 0) _audioChunks.push(e.data); };
    _mediaRecorder.onstop = _onRecordingStop;
    _mediaRecorder.start();
    _recordingSeconds = 0;
    // Update UI
    const btn = document.getElementById('voice-btn');
    if (btn) { btn.style.background = '#e63946'; btn.style.color = '#fff'; btn.title = 'إيقاف التسجيل'; }
    // Timer
    const timer = document.getElementById('voice-timer');
    _recordingTimer = setInterval(() => {
      _recordingSeconds++;
      if (timer) timer.textContent = `⏺ ${_recordingSeconds}ث`;
      if (_recordingSeconds >= 60) stopVoiceRecord(); // max 60s
    }, 1000);
    if (timer) { timer.style.display = 'inline'; timer.textContent = '⏺ 0ث'; }
    showToast('🎤 التسجيل جارٍ... اضغط مرة أخرى للإيقاف', 'info');
  } catch (e) {
    showToast('⚠️ لا يمكن الوصول للميكروفون', 'error');
  }
}

function stopVoiceRecord() {
  if (_mediaRecorder && _mediaRecorder.state === 'recording') {
    _mediaRecorder.stop();
    _mediaRecorder.stream.getTracks().forEach(t => t.stop());
  }
  clearInterval(_recordingTimer);
  const btn = document.getElementById('voice-btn');
  if (btn) { btn.style.background = ''; btn.style.color = ''; }
  const timer = document.getElementById('voice-timer');
  if (timer) timer.style.display = 'none';
}

async function _onRecordingStop() {
  if (_audioChunks.length === 0 || _recordingSeconds < 1) return;
  const blob = new Blob(_audioChunks, { type: 'audio/webm' });
  const reader = new FileReader();
  reader.onload = async () => {
    const base64 = reader.result.split(',')[1];
    if (base64.length > 500000) { showToast('الرسالة الصوتية طويلة جداً (حد 30ث)', 'warning'); return; }
    try {
      if (await isMuted()) return;
      await push(ref(rtdb, 'public_chat'), {
        isVoice: true,
        voiceData: base64,
        voiceDuration: _recordingSeconds,
        uid: currentUserData.uid,
        name: currentUserData.nickname || currentUserData.name,
        nickname: currentUserData.nickname || '',
        avatar: currentUserData.avatar || '',
        rank: currentUserData.rank || '',
        reactions: {},
        timestamp: Date.now()
      });
      showToast('✅ تم إرسال الرسالة الصوتية', 'success');
      incrementUserStat(currentUserData.uid, 'totalChatMsgs');
    } catch (e) { showToast('خطأ: ' + e.message, 'error'); }
  };
  reader.readAsDataURL(blob);
}

function playVoiceMessage(base64Data, btnEl) {
  try {
    const blob = _b64toBlob(base64Data, 'audio/webm');
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    if (btnEl) { btnEl.textContent = '⏸'; btnEl.disabled = true; }
    audio.play();
    audio.onended = () => {
      if (btnEl) { btnEl.textContent = '▶️'; btnEl.disabled = false; }
      URL.revokeObjectURL(url);
    };
    audio.onerror = () => {
      if (btnEl) { btnEl.textContent = '▶️'; btnEl.disabled = false; }
      showToast('لا يمكن تشغيل هذا الصوت', 'error');
    };
  } catch (e) { showToast('خطأ في تشغيل الصوت', 'error'); }
}

function _b64toBlob(b64Data, contentType) {
  const byteChars = atob(b64Data);
  const byteArr = new Uint8Array(byteChars.length);
  for (let i = 0; i < byteChars.length; i++) byteArr[i] = byteChars.charCodeAt(i);
  return new Blob([byteArr], { type: contentType });
}

let BANNED_WORDS = [];
let _wordFilterLoaded = false;

async function loadWordFilter() {
  if (_wordFilterLoaded) return;
  try {
    const snap = await getDoc(doc(db, 'settings', 'word_filter'));
    if (snap.exists()) BANNED_WORDS = snap.data().words || [];
    _wordFilterLoaded = true;
  } catch (e) { console.warn('word filter:', e); }
}

function filterText(text) {
  if (!BANNED_WORDS.length || !text) return text;
  let filtered = text;
  BANNED_WORDS.forEach(word => {
    if (!word || word.length < 2) return;
    const stars = '*'.repeat(word.length);
    // Case-insensitive, whole words and partial
    const re = new RegExp(word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
    filtered = filtered.replace(re, stars);
  });
  return filtered;
}

let particlesInt=null, particlesList=[];
function stopParticles(){
  if(particlesInt){clearInterval(particlesInt);particlesInt=null;}
  const c=document.getElementById('particles-canvas'); if(c) c.style.display='none';
  particlesList=[];
}

function startParticles(type){
  stopParticles();
  const c=document.getElementById('particles-canvas'); if(!c) return;
  c.width=innerWidth; c.height=innerHeight;
  c.style.display='block';
  const ctx=c.getContext('2d');

  if(type==='gold'){
    // Golden rain drops — The Chosen One
    particlesList=Array.from({length:60},()=>({
      x:Math.random()*innerWidth,
      y:Math.random()*innerHeight-innerHeight,
      size:Math.random()*3+1,
      speed:Math.random()*1.5+0.5,
      opacity:Math.random()*0.6+0.2,
      color:`hsl(${Math.random()*20+40},100%,${Math.random()*20+60}%)`,
      wobble:Math.random()*Math.PI*2,
      wobbleSpeed:Math.random()*0.05+0.02
    }));
    particlesInt=setInterval(()=>{
      ctx.clearRect(0,0,c.width,c.height);
      particlesList.forEach(p=>{
        p.y+=p.speed; p.wobble+=p.wobbleSpeed;
        p.x+=Math.sin(p.wobble)*0.4;
        if(p.y>c.height){p.y=-10;p.x=Math.random()*c.width;}
        ctx.save();ctx.globalAlpha=p.opacity;
        ctx.fillStyle=p.color;
        ctx.shadowBlur=8;ctx.shadowColor=p.color;
        ctx.beginPath();
        // Diamond shape
        ctx.moveTo(p.x,p.y-p.size*2);
        ctx.lineTo(p.x+p.size,p.y);
        ctx.lineTo(p.x,p.y+p.size*2);
        ctx.lineTo(p.x-p.size,p.y);
        ctx.closePath();ctx.fill();ctx.restore();
      });
    },33);

  } else if(type==='smoke'){
    // HIM — Dark drifting smoke orbs
    particlesList=Array.from({length:25},()=>({
      x:Math.random()*innerWidth,
      y:Math.random()*innerHeight,
      size:Math.random()*80+30,
      speedX:(Math.random()-.5)*0.3,
      speedY:-Math.random()*0.3-0.1,
      opacity:Math.random()*0.06+0.02,
      hue:Math.random()*20+30
    }));
    particlesInt=setInterval(()=>{
      ctx.clearRect(0,0,c.width,c.height);
      particlesList.forEach(p=>{
        p.x+=p.speedX; p.y+=p.speedY; p.size+=0.1;
        if(p.y<-100||p.size>200){
          p.x=Math.random()*innerWidth;p.y=innerHeight+50;
          p.size=Math.random()*80+30;p.opacity=Math.random()*0.06+0.02;
        }
        const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size);
        g.addColorStop(0,`rgba(201,168,76,${p.opacity})`);
        g.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=g; ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
      });
    },50);

  } else if(type==='cyber'){
    particlesList=Array.from({length:40},()=>({
      x:Math.random()*innerWidth,y:Math.random()*innerHeight,
      length:Math.random()*80+20,
      angle:Math.random()*Math.PI*2,
      speed:Math.random()*2+1,
      opacity:Math.random()*0.3+0.05,
      color:Math.random()>0.5?'#ff2d78':'#7b2fff',
      pulse:Math.random()*Math.PI*2,pulseSpeed:Math.random()*0.05+0.02
    }));
    particlesInt=setInterval(()=>{
      ctx.clearRect(0,0,c.width,c.height);
      particlesList.forEach(p=>{
        p.x+=Math.cos(p.angle)*p.speed;
        p.y+=Math.sin(p.angle)*p.speed;
        p.pulse+=p.pulseSpeed;
        const alpha=p.opacity*(0.7+0.3*Math.sin(p.pulse));
        if(p.x<-200||p.x>innerWidth+200||p.y<-200||p.y>innerHeight+200){
          p.x=Math.random()*innerWidth; p.y=Math.random()*innerHeight;
          p.angle=Math.random()*Math.PI*2;
        }
        ctx.save();ctx.globalAlpha=alpha;
        ctx.strokeStyle=p.color;ctx.lineWidth=1.5;
        ctx.shadowBlur=10;ctx.shadowColor=p.color;
        ctx.beginPath();
        ctx.moveTo(p.x,p.y);
        ctx.lineTo(p.x-Math.cos(p.angle)*p.length, p.y-Math.sin(p.angle)*p.length);
        ctx.stroke();ctx.restore();
      });
    },40);

  } else if(type==='fire'){
    // Summer/Inferno — rising fire embers
    particlesList=Array.from({length:55},()=>({
      x:Math.random()*innerWidth,y:innerHeight+10,
      size:Math.random()*4+1,speed:Math.random()*2+0.8,
      opacity:Math.random()*0.5+0.1,
      hue:Math.random()*40, // 0-40 = red to orange
      wobble:Math.random()*Math.PI*2,wobbleSpeed:Math.random()*0.06+0.02,life:Math.random()
    }));
    particlesInt=setInterval(()=>{
      ctx.clearRect(0,0,c.width,c.height);
      particlesList.forEach(p=>{
        p.y-=p.speed; p.wobble+=p.wobbleSpeed; p.x+=Math.sin(p.wobble)*0.8;
        p.life-=0.005; if(p.life<0||p.y<-20){p.y=innerHeight+10;p.x=Math.random()*innerWidth;p.life=Math.random();}
        ctx.save();ctx.globalAlpha=p.opacity*p.life;
        const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*3);
        g.addColorStop(0,`hsl(${p.hue},100%,80%)`);g.addColorStop(.5,`hsl(${p.hue+10},100%,55%)`);g.addColorStop(1,'transparent');
        ctx.fillStyle=g;ctx.shadowBlur=12;ctx.shadowColor=`hsl(${p.hue},100%,60%)`;
        ctx.beginPath();ctx.arc(p.x,p.y,p.size*2,0,Math.PI*2);ctx.fill();ctx.restore();
      });
    },33);

  } else if(type==='snow'){
    // Winter — falling snowflakes
    particlesList=Array.from({length:60},()=>({
      x:Math.random()*innerWidth,y:Math.random()*innerHeight-innerHeight,
      size:Math.random()*4+1,speed:Math.random()*0.8+0.2,
      opacity:Math.random()*0.5+0.15,wobble:Math.random()*Math.PI*2,wobbleSpeed:Math.random()*0.02+0.005
    }));
    particlesInt=setInterval(()=>{
      ctx.clearRect(0,0,c.width,c.height);
      particlesList.forEach(p=>{
        p.y+=p.speed;p.wobble+=p.wobbleSpeed;p.x+=Math.sin(p.wobble)*0.5;
        if(p.y>innerHeight+10){p.y=-10;p.x=Math.random()*innerWidth;}
        ctx.save();ctx.globalAlpha=p.opacity;ctx.fillStyle='#e0f4ff';
        ctx.shadowBlur=8;ctx.shadowColor='#00aaff';
        // Draw snowflake
        for(let i=0;i<6;i++){
          ctx.beginPath();const a=i*Math.PI/3;
          ctx.moveTo(p.x,p.y);ctx.lineTo(p.x+Math.cos(a)*p.size*2,p.y+Math.sin(a)*p.size*2);
          ctx.strokeStyle='#a0d8ff';ctx.lineWidth=1;ctx.stroke();
        }
        ctx.restore();
      });
    },40);

  } else if(type==='leaves'){
    // Autumn — falling leaves
    const leafColors=['#d4621a','#c84400','#e8900a','#b03300','#f0aa22'];
    particlesList=Array.from({length:35},()=>({
      x:Math.random()*innerWidth,y:Math.random()*innerHeight-innerHeight,
      size:Math.random()*10+6,speed:Math.random()*0.7+0.3,
      opacity:Math.random()*0.55+0.2,
      angle:Math.random()*Math.PI*2,angleSpeed:Math.random()*0.04-0.02,
      wobble:Math.random()*Math.PI*2,wobbleSpeed:Math.random()*0.03+0.01,
      color:leafColors[Math.floor(Math.random()*leafColors.length)]
    }));
    particlesInt=setInterval(()=>{
      ctx.clearRect(0,0,c.width,c.height);
      particlesList.forEach(p=>{
        p.y+=p.speed;p.wobble+=p.wobbleSpeed;p.x+=Math.sin(p.wobble)*1.5;p.angle+=p.angleSpeed;
        if(p.y>innerHeight+20){p.y=-20;p.x=Math.random()*innerWidth;}
        ctx.save();ctx.globalAlpha=p.opacity;ctx.translate(p.x,p.y);ctx.rotate(p.angle);
        ctx.fillStyle=p.color;ctx.shadowBlur=6;ctx.shadowColor=p.color;
        ctx.beginPath();ctx.ellipse(0,0,p.size,p.size*0.6,0,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.moveTo(0,-p.size*0.5);ctx.quadraticCurveTo(p.size*0.5,0,0,p.size*0.5);
        ctx.strokeStyle=p.color+'aa';ctx.lineWidth=0.8;ctx.stroke();
        ctx.restore();
      });
    },40);

  } else if(type==='petals'){
    // Spring — flower petals
    const petalColors=['#ffb3c6','#ff8fab','#ff4d6d','#ffc8dd','#ffcbf2'];
    particlesList=Array.from({length:40},()=>({
      x:Math.random()*innerWidth,y:Math.random()*innerHeight-innerHeight,
      size:Math.random()*8+4,speed:Math.random()*0.6+0.2,
      opacity:Math.random()*0.5+0.15,
      angle:Math.random()*Math.PI*2,angleSpeed:Math.random()*0.03-0.015,
      wobble:Math.random()*Math.PI*2,wobbleSpeed:Math.random()*0.025+0.01,
      color:petalColors[Math.floor(Math.random()*petalColors.length)]
    }));
    particlesInt=setInterval(()=>{
      ctx.clearRect(0,0,c.width,c.height);
      particlesList.forEach(p=>{
        p.y+=p.speed;p.wobble+=p.wobbleSpeed;p.x+=Math.sin(p.wobble)*1.2;p.angle+=p.angleSpeed;
        if(p.y>innerHeight+20){p.y=-20;p.x=Math.random()*innerWidth;}
        ctx.save();ctx.globalAlpha=p.opacity;ctx.translate(p.x,p.y);ctx.rotate(p.angle);
        ctx.fillStyle=p.color;ctx.shadowBlur=8;ctx.shadowColor=p.color;
        ctx.beginPath();ctx.ellipse(0,0,p.size,p.size*0.5,0,0,Math.PI*2);ctx.fill();
        ctx.restore();
      });
    },40);

  } else if(type==='void'){
    // Void — dark swirling particles
    particlesList=Array.from({length:50},()=>({
      angle:Math.random()*Math.PI*2,radius:Math.random()*300+50,
      speed:Math.random()*0.008+0.002,
      size:Math.random()*3+0.5,opacity:Math.random()*0.4+0.05,
      color:Math.random()>0.5?'#cc00ff':'#8800cc'
    }));
    const cx2=innerWidth/2,cy2=innerHeight/2;
    particlesInt=setInterval(()=>{
      ctx.clearRect(0,0,c.width,c.height);
      particlesList.forEach(p=>{
        p.angle+=p.speed;
        const x=cx2+Math.cos(p.angle)*p.radius; const y=cy2+Math.sin(p.angle)*p.radius;
        ctx.save();ctx.globalAlpha=p.opacity;ctx.fillStyle=p.color;
        ctx.shadowBlur=15;ctx.shadowColor=p.color;
        ctx.beginPath();ctx.arc(x,y,p.size,0,Math.PI*2);ctx.fill();ctx.restore();
      });
    },33);

  } else if(type==='bubbles'){
    // Ocean — rising bubbles
    particlesList=Array.from({length:40},()=>({
      x:Math.random()*innerWidth,y:innerHeight+Math.random()*200,
      size:Math.random()*12+2,speed:Math.random()*0.6+0.2,
      opacity:Math.random()*0.2+0.04,wobble:Math.random()*Math.PI*2,wobbleSpeed:Math.random()*0.02+0.005
    }));
    particlesInt=setInterval(()=>{
      ctx.clearRect(0,0,c.width,c.height);
      particlesList.forEach(p=>{
        p.y-=p.speed;p.wobble+=p.wobbleSpeed;p.x+=Math.sin(p.wobble)*0.4;
        if(p.y<-20){p.y=innerHeight+20;p.x=Math.random()*innerWidth;}
        ctx.save();ctx.globalAlpha=p.opacity;
        ctx.strokeStyle='#0066ff';ctx.lineWidth=1.2;ctx.shadowBlur=8;ctx.shadowColor='#0066ff';
        ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.stroke();
        ctx.globalAlpha=p.opacity*0.3;ctx.fillStyle='#00aaff';ctx.fill();
        ctx.restore();
      });
    },40);

  } else if(type==='ghost'){
    // Phantom — floating ghost wisps
    particlesList=Array.from({length:20},()=>({
      x:Math.random()*innerWidth,y:Math.random()*innerHeight,
      size:Math.random()*40+15,speedX:(Math.random()-.5)*0.3,speedY:(Math.random()-.5)*0.2,
      opacity:Math.random()*0.06+0.01,pulse:Math.random()*Math.PI*2,pulseSpeed:Math.random()*0.02+0.005
    }));
    particlesInt=setInterval(()=>{
      ctx.clearRect(0,0,c.width,c.height);
      particlesList.forEach(p=>{
        p.x+=p.speedX;p.y+=p.speedY;p.pulse+=p.pulseSpeed;
        if(p.x<-100||p.x>innerWidth+100){p.speedX*=-1;}
        if(p.y<-100||p.y>innerHeight+100){p.speedY*=-1;}
        const a=p.opacity*(0.6+0.4*Math.sin(p.pulse));
        const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size);
        g.addColorStop(0,`rgba(255,255,255,${a})`);g.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
      });
    },50);

  } else if(type==='aurora'){
    // Aurora — flowing northern lights bands
    let auroraT=0;
    particlesInt=setInterval(()=>{
      ctx.clearRect(0,0,c.width,c.height);
      auroraT+=0.008;
      for(let i=0;i<4;i++){
        const hue=160+i*30+Math.sin(auroraT+i)*20;
        ctx.save();ctx.globalAlpha=0.04+Math.sin(auroraT*0.7+i)*0.02;
        ctx.fillStyle=`hsl(${hue},100%,60%)`;
        ctx.shadowBlur=40;ctx.shadowColor=`hsl(${hue},100%,60%)`;
        ctx.beginPath();
        const yOff=innerHeight*(0.1+i*0.15)+Math.sin(auroraT+i*0.8)*80;
        ctx.moveTo(0,yOff);
        for(let x=0;x<=innerWidth;x+=40){
          const y=yOff+Math.sin(x*0.005+auroraT+i)*60+Math.cos(x*0.003+auroraT*0.7)*30;
          ctx.lineTo(x,y);
        }
        ctx.lineTo(innerWidth,0);ctx.lineTo(0,0);ctx.closePath();ctx.fill();
        ctx.restore();
      }
    },40);
  }
}

function applyThemeWithFX(name){
  _applyThemeOrig(name);
  stopParticles();
  // builtin
  if(name==='chosen') startParticles('gold');
  else if(name==='him') startParticles('smoke');
  else if(name==='cyberpunk') startParticles('cyber');
  // seasonal
  else if(name==='summer'||name==='inferno') startParticles('fire');
  else if(name==='winter') startParticles('snow');
  else if(name==='autumn') startParticles('leaves');
  else if(name==='spring') startParticles('petals');
  else if(name==='void') startParticles('void');
  else if(name==='ocean') startParticles('bubbles');
  else if(name==='phantom') startParticles('ghost');
  else if(name==='aurora') startParticles('aurora');
}
// Replace applyTheme globally
window.applyThemeWithFX=applyThemeWithFX;

function updateBCPreview(){
  const bg=document.getElementById('bc-bg')?.value||'#0a0a1a';
  const textColor=document.getElementById('bc-text')?.value||'#e63946';
  const border=document.getElementById('bc-border')?.value||'#e63946';
  const font=document.getElementById('bc-font')?.value||"'Cinzel Decorative',serif";
  const size=document.getElementById('bc-size')?.value||'22';
  const msg=document.getElementById('bc-msg')?.value||'اكتب رسالتك أعلاه...';
  const img=document.getElementById('bc-img')?.value||'';
  const prev=document.getElementById('bc-preview'); if(!prev) return;
  prev.style.background=bg;
  prev.style.border=`1px solid ${border}`;
  prev.innerHTML=`
    ${img?`<img src="${img}" style="max-height:80px;border-radius:8px;object-fit:cover;" onerror="this.remove()">` :''}
    <div style="font-family:${font};font-size:${size}px;color:${textColor};text-shadow:0 0 20px ${textColor}50;line-height:1.5;">${esc(msg)||'...'}</div>
    <div style="font-size:11px;color:${textColor}88;font-family:${font};">— 👑 LUCIFER ADMIN</div>`;
}

async function sendBroadcast(){
  const msg=document.getElementById('bc-msg')?.value?.trim();
  if(!msg){showToast('اكتب رسالة أولاً','warning');return;}
  const cfg={
    msg,
    bg:document.getElementById('bc-bg')?.value||'#0a0a1a',
    textColor:document.getElementById('bc-text')?.value||'#e63946',
    border:document.getElementById('bc-border')?.value||'#e63946',
    font:document.getElementById('bc-font')?.value||"'Cinzel Decorative',serif",
    size:document.getElementById('bc-size')?.value||'22',
    img:document.getElementById('bc-img')?.value||'',
    dur:parseInt(document.getElementById('bc-dur')?.value||'8')*1000
  };
  // Save to RTDB so all users see it
  await set(ref(rtdb,'broadcast'),{...cfg,sentAt:Date.now(),sentBy:currentUserData.nickname||currentUserData.name});
  // Clear after duration
  setTimeout(()=>remove(ref(rtdb,'broadcast')),cfg.dur+2000);
  showToast('📡 تم البث!','success');
  playNotifSound('alert');
}

function previewBroadcastFull(){
  const bc={
    msg:document.getElementById('bc-msg')?.value||'رسالة تجريبية',
    bg:document.getElementById('bc-bg')?.value||'#0a0a1a',
    textColor:document.getElementById('bc-text')?.value||'#e63946',
    border:document.getElementById('bc-border')?.value||'#e63946',
    font:document.getElementById('bc-font')?.value||"'Cinzel Decorative',serif",
    size:document.getElementById('bc-size')?.value||'22',
    img:document.getElementById('bc-img')?.value||'',
    dur:5000
  };
  showBroadcastOverlay(bc);
}

function showBroadcastOverlay(cfg){
  const old=document.getElementById('broadcast-overlay'); if(old) old.remove();
  const div=document.createElement('div');
  div.id='broadcast-overlay';
  div.style.cssText=`position:fixed;top:0;left:0;width:100%;height:100%;z-index:999998;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.88);backdrop-filter:blur(12px);animation:bcIn 0.6s cubic-bezier(.175,.885,.32,1.275);`;
  div.innerHTML=`
    <div style="max-width:700px;width:92vw;background:${cfg.bg};border:2px solid ${cfg.border};border-radius:20px;padding:48px 36px;text-align:center;box-shadow:0 0 80px ${cfg.border}55,0 0 160px ${cfg.border}22;position:relative;overflow:hidden;">
      <div style="position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,${cfg.border},transparent);animation:shimmer2 2s linear infinite;"></div>
      ${cfg.img?`<img src="${cfg.img}" style="max-height:160px;border-radius:12px;margin-bottom:24px;object-fit:cover;" onerror="this.remove()">` :''}
      <div style="font-size:28px;color:${cfg.border};margin-bottom:16px;opacity:.8;">👑</div>
      <div style="font-family:${cfg.font};font-size:${cfg.size}px;color:${cfg.textColor};text-shadow:0 0 30px ${cfg.textColor}66;line-height:1.6;margin-bottom:20px;">${esc(cfg.msg)}</div>
      <div style="font-size:12px;color:${cfg.textColor}66;font-family:${cfg.font};letter-spacing:2px;">— LUCIFER ADMIN —</div>
      <div style="position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,${cfg.border},transparent);animation:shimmer2 2s linear infinite reverse;"></div>
    </div>`;
  document.body.appendChild(div);
  div.onclick=()=>div.remove();
  setTimeout(()=>div.remove(), cfg.dur||8000);
}

// Watch broadcast from RTDB
function watchBroadcast(){
  onValue(ref(rtdb,'broadcast'),snap=>{
    if(!snap.exists()) return;
    const cfg=snap.val();
    if(!cfg||!cfg.msg) return;
    showBroadcastOverlay(cfg);
    playNotifSound('alert');
  });
}

function spawnGoldenBird(reportData){
  const old=document.getElementById('golden-bird'); if(old) old.remove();
  const wrap=document.createElement('div');
  wrap.id='golden-bird';
  wrap.style.cssText='position:fixed;top:0;left:-220px;z-index:99999;cursor:pointer;pointer-events:all;filter:drop-shadow(0 0 12px #ffd700);';
  wrap.innerHTML=`
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <svg id="gbird-svg" width="70" height="48" viewBox="0 0 70 48">
        <defs>
          <radialGradient id="glow_b" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#ffe066"/>
            <stop offset="100%" stop-color="#b8860b"/>
          </radialGradient>
        </defs>
        <ellipse cx="35" cy="30" rx="18" ry="11" fill="url(#glow_b)" stroke="#ffd700" stroke-width="1.5"/>
        <circle cx="53" cy="22" r="9" fill="url(#glow_b)" stroke="#ffd700" stroke-width="1.5"/>
        <polygon points="62,21 72,23 62,25" fill="#ff9900"/>
        <circle cx="56" cy="20" r="2.5" fill="#1a0a00"/><circle cx="57" cy="19.5" r="1" fill="#ffd700"/>
        <path id="gbwl" d="M26 30 Q18 18 10 23 Q18 33 26 30Z" fill="#ffd700"/>
        <path id="gbwr" d="M44 30 Q52 18 60 23 Q52 33 44 30Z" fill="#ffd700"/>
        <path d="M17 30 Q10 36 7 33 Q12 40 17 35Z" fill="url(#glow_b)" stroke="#ffd700" stroke-width="1"/>
        <rect x="20" y="34" width="20" height="13" rx="2" fill="#111" stroke="#ffd700" stroke-width="1.5"/>
        <path d="M20 34 L30 41 L40 34" fill="none" stroke="#ffd700" stroke-width="1.2"/>
        <text x="30" y="43" text-anchor="middle" fill="#ffd700" font-size="6" font-weight="bold">!</text>
      </svg>
      <div style="background:#0a0800;border:1px solid #ffd700;border-radius:10px;padding:8px 16px;font-size:11px;color:#ffd700;font-family:'Share Tech Mono',monospace;white-space:nowrap;box-shadow:0 0 20px rgba(255,215,0,0.5);max-width:240px;text-align:center;">
        🚨 ابلاغ جديد!<br>
        <span style="font-size:10px;color:#ffaa00;">${esc((reportData?.targetContent||'').slice(0,30))||'محتوى جديد'}</span>
      </div>
    </div>`;
  document.body.appendChild(wrap);
  let wingUp=true;
  const flapInt=setInterval(()=>{
    const wl=document.getElementById('gbwl'); const wr=document.getElementById('gbwr');
    if(!wl){clearInterval(flapInt);return;}
    if(wingUp){wl.setAttribute('d','M26 30 Q18 12 10 17 Q18 27 26 30Z');wr.setAttribute('d','M44 30 Q52 12 60 17 Q52 27 44 30Z');}
    else{wl.setAttribute('d','M26 30 Q18 18 10 23 Q18 33 26 30Z');wr.setAttribute('d','M44 30 Q52 18 60 23 Q52 33 44 30Z');}
    wingUp=!wingUp;
  },180);
  const W=window.innerWidth; const H=window.innerHeight;
  let t=0,phase=0;
  const flyInt=setInterval(()=>{
    t+=0.01;
    let x,y;
    if(phase===0){x=-180+t*(W+240)*0.9;y=H*0.08+Math.sin(t*3)*30;if(x>W*0.5)phase=1;}
    else if(phase===1){x=W*0.5+Math.cos(t*1.8)*W*0.32;y=H*0.1+Math.sin(t*2.2)*50;if(t>2.8)phase=2;}
    else{x=W*0.85+(t-2.8)*700;y=H*0.08+Math.sin(t*5)*20;}
    wrap.style.left=x+'px'; wrap.style.top=y+'px';
    const svg=document.getElementById('gbird-svg');
    if(svg){if(phase===1&&Math.cos(t*1.8)<0)svg.style.transform='scaleX(-1)';else svg.style.transform='scaleX(1)';}
    if(x>W+240){clearInterval(flyInt);clearInterval(flapInt);wrap.remove();}
  },16);
  wrap.onclick=()=>{clearInterval(flyInt);clearInterval(flapInt);wrap.remove();showSection('admin');switchAdminTab('reports');};
  setTimeout(()=>{clearInterval(flyInt);clearInterval(flapInt);if(wrap.parentNode)wrap.remove();},14000);
}
