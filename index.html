<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LuciferNet ⚡</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Share+Tech+Mono&family=Exo+2:wght@100;300;400;600;700;900&family=Orbitron:wght@400;700;900&family=VT323&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;
  --accent:#e63946;--accent2:#c1121f;
  --text:#e8e8f0;--text2:#9999aa;--border:#2a2a35;--glow:rgba(230,57,70,0.3);
  --font-main:'Exo 2',sans-serif;--font-brand:'Cinzel Decorative',serif;
  --sidebar-w:240px;--r:12px;--tr:0.2s ease;
}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--font-main);font-size:14px;transition:background .5s,color .3s;}
#app{height:100vh;position:relative;}

/* HACKER TOPBAR */
.hacker-topbar{
  position:fixed;top:0;left:0;right:0;height:44px;
  background:#000;border-bottom:1px solid #003311;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;z-index:10000;
  font-family:'Share Tech Mono',monospace;font-size:13px;
}
.htb-left{display:flex;align-items:center;gap:12px;}
.htb-logo{color:#00ff41;font-weight:700;text-shadow:0 0 10px #00ff41;letter-spacing:2px;}
.htb-center{flex:1;text-align:center;}
.htb-cmd{
  background:#0a1a0a;border:1px solid #003311;
  padding:5px 20px;border-radius:4px;color:#00aa2a;
  font-size:13px;letter-spacing:1px;
}
.htb-right{display:flex;align-items:center;gap:12px;color:#00aa2a;}
.htb-online{color:#00ff41;text-shadow:0 0 8px #00ff41;animation:blink 1.5s step-end infinite;}
.htb-pid,.htb-sep{color:#006622;}
.htb-theme-label{border:1px solid #003311;padding:3px 10px;border-radius:3px;cursor:pointer;color:#00ff41;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.4;}}

/* hacker mode pushes layout down */
body.theme-hacker #app-layout{margin-top:44px;}
body.theme-hacker .main-content{height:calc(100vh - 44px);}

/* SCANLINES */
#scanlines{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;opacity:.04;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.1) 2px,rgba(255,255,255,.1) 4px);}

/* LANDING */
.landing-screen{display:flex;align-items:center;justify-content:center;height:100vh;background:radial-gradient(ellipse at center,var(--bg3) 0%,var(--bg) 70%);}
.landing-content{text-align:center;z-index:1;padding:20px;}
.landing-title{font-family:var(--font-brand);font-size:clamp(32px,6vw,72px);color:var(--accent);letter-spacing:4px;text-shadow:0 0 40px var(--glow),0 0 80px var(--glow);margin:16px 0 8px;}
@keyframes pulse-glow{0%,100%{filter:drop-shadow(0 0 20px var(--accent));}50%{filter:drop-shadow(0 0 60px var(--accent));}}

/* LAYOUT */
#app-layout{display:flex;height:100vh;overflow:hidden;}
#sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow-y:auto;z-index:10;}
.brand-header{display:flex;align-items:center;gap:10px;padding:20px 16px;border-bottom:1px solid var(--border);}
.brand-name{font-family:var(--font-brand);font-size:15px;font-weight:700;color:var(--accent);text-shadow:0 0 15px var(--glow);}
.sidebar-user{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--border);font-weight:600;font-size:13px;transition:background var(--tr);}
.sidebar-user:hover{background:var(--bg3);}
.nav-item{display:flex;align-items:center;gap:10px;padding:12px 20px;cursor:pointer;transition:all var(--tr);border-right:3px solid transparent;font-weight:500;color:var(--text2);}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item.active{border-right-color:var(--accent);background:rgba(255,255,255,.04);color:var(--accent);}
.nav-item>span:first-child{font-size:18px;}
.btn-logout{margin:12px;border-radius:var(--r);width:calc(100% - 24px);}
.report-badge{background:var(--accent);color:#fff;border-radius:50%;min-width:18px;height:18px;font-size:10px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;margin-right:auto;padding:0 4px;}
.main-content{flex:1;overflow-y:auto;padding:24px;background:var(--bg);}

/* BOTTOM NAV */
#bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px;font-size:10px;cursor:pointer;color:var(--text2);gap:2px;transition:color var(--tr);}
.bnav-item.active,.bnav-item:hover{color:var(--accent);}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:16px;}
.section-header{display:flex;align-items:center;gap:10px;font-family:var(--font-brand);font-size:20px;font-weight:700;color:var(--accent);margin-bottom:20px;text-shadow:0 0 20px var(--glow);padding-bottom:12px;border-bottom:1px solid var(--border);}

/* POST */
.composer-input{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--text);font-family:var(--font-main);resize:vertical;min-height:80px;width:100%;transition:border-color var(--tr);}
.composer-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 10px var(--glow);}
.composer-row{display:flex;gap:12px;align-items:flex-start;}
.post-card{animation:fadeInUp .3s ease;}
.post-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.post-meta{flex:1;}.post-author{font-weight:700;display:block;}.post-time{font-size:11px;color:var(--text2);}
.post-body{font-size:15px;line-height:1.6;margin-bottom:10px;white-space:pre-wrap;}
.comments-section{margin-top:10px;border-top:1px solid var(--border);padding-top:10px;}
.comment-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:7px 14px;color:var(--text);font-family:var(--font-main);font-size:13px;transition:border-color var(--tr);}
.comment-input:focus{outline:none;border-color:var(--accent);}

/* CHAT */
.chat-container{display:flex;flex-direction:column;height:calc(100vh - 160px);background:var(--bg2);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;}
.messages-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;scroll-behavior:smooth;}
.messages-area::-webkit-scrollbar{width:4px;}
.messages-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.chat-input-area{display:flex;gap:8px;padding:12px;border-top:1px solid var(--border);background:var(--bg3);flex-wrap:wrap;}
.chat-input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:var(--font-main);transition:border-color var(--tr);}
.chat-input:focus{outline:none;border-color:var(--accent);}
.chat-input:disabled{opacity:.4;cursor:not-allowed;}
.message{display:flex;flex-direction:column;max-width:75%;}
.msg-mine{align-self:flex-start;}.msg-other{align-self:flex-end;}
.msg-bubble{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:10px 14px;word-break:break-word;}
.msg-mine .msg-bubble{background:var(--accent2);border-color:var(--accent);box-shadow:0 0 10px var(--glow);}
.msg-sender{font-size:11px;font-weight:700;color:var(--accent);display:block;margin-bottom:3px;}
.msg-text{font-size:14px;line-height:1.5;}
.msg-time{font-size:10px;color:var(--text2);margin-top:4px;display:block;text-align:left;}
.msg-actions{display:flex;align-items:center;gap:4px;margin-top:3px;flex-wrap:wrap;}
.reply-preview{background:rgba(255,255,255,.05);border-right:2px solid var(--accent);border-radius:4px;padding:4px 8px;font-size:11px;color:var(--text2);margin-bottom:6px;}
.closed-banner{text-align:center;padding:12px;background:rgba(230,57,70,.15);border-top:1px solid var(--accent);color:var(--accent);font-size:13px;}
.chat-header{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--bg3);flex-shrink:0;}
.two-col{display:flex;gap:16px;height:calc(100vh - 160px);}
.users-list{width:260px;flex-shrink:0;overflow-y:auto;padding:10px;}
.chat-panel{flex:1;display:flex;flex-direction:column;background:var(--bg2);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;}
.user-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;cursor:pointer;transition:background var(--tr);}
.user-item:hover{background:var(--bg3);}
.search-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:var(--font-main);}
.search-input:focus{outline:none;border-color:var(--accent);}

/* GROUPS */
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;margin-top:16px;}
.group-card{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}

/* THEMES */
.themes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:20px;margin-top:16px;}
.theme-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;cursor:pointer;transition:all .3s;position:relative;text-align:center;}
.theme-card:hover{transform:translateY(-4px);box-shadow:0 8px 30px var(--glow);border-color:var(--accent);}
.theme-card.locked{opacity:.5;cursor:not-allowed;}
.theme-preview{height:80px;border-radius:8px;margin-bottom:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.theme-name{font-weight:700;font-size:15px;margin-bottom:4px;}
.theme-desc{font-size:12px;color:var(--text2);}
.theme-active-badge{position:absolute;top:10px;left:10px;background:var(--accent);color:#000;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;}
.theme-lock{position:absolute;top:10px;right:10px;font-size:18px;}

/* CUSTOM THEME BUILDER */
.custom-theme-builder{display:flex;flex-direction:column;gap:10px;}
.ctb-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.ctb-row label{min-width:120px;font-size:12px;color:var(--text2);}
.ctb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
.ctb-field{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;}
.ctb-field label{font-size:11px;color:var(--text2);flex:1;}
.color-inp{width:40px;height:30px;border:none;border-radius:6px;cursor:pointer;padding:2px;}
.ctb-field span{font-size:11px;font-family:monospace;color:var(--text2);min-width:60px;}
.ct-preview-box{min-height:100px;border-radius:12px;padding:16px;transition:all .3s;}

/* ADMIN */
.admin-tabs{display:flex;gap:6px;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:12px;flex-wrap:wrap;}
.atab{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 16px;cursor:pointer;color:var(--text2);font-family:var(--font-main);transition:all var(--tr);}
.atab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.report-card{margin-bottom:12px;}
.report-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.report-type-badge{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:12px;}
.report-status{border-radius:20px;padding:3px 10px;font-size:12px;font-weight:700;}
.status-pending{background:rgba(244,162,97,.15);color:#f4a261;border:1px solid #f4a261;}
.status-done{background:rgba(0,200,65,.1);color:#00cc41;border:1px solid #00cc41;}
.report-reasons{display:flex;flex-wrap:wrap;gap:8px;}
.reason-btn{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:6px 12px;cursor:pointer;color:var(--text2);font-family:var(--font-main);font-size:12px;transition:all var(--tr);}
.reason-btn:hover{border-color:var(--accent);color:var(--accent);}
.reason-btn.reason-active{background:var(--accent);color:#fff;border-color:var(--accent);}
.admin-user-item{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:10px;}
.admin-actions{display:flex;gap:6px;flex-wrap:wrap;}
.punished-item{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:10px;}

/* PROFILE */
.profile-card{max-width:600px;}
.field-group{display:flex;flex-direction:column;gap:6px;}
.field-group label{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;}
.role-badge{font-size:12px;padding:3px 10px;border-radius:20px;font-weight:600;}
.admin-badge{background:linear-gradient(135deg,#c9a84c,#8b6914);color:#000;}
.user-badge{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}

/* BADGES */
.badge-chosen{background:linear-gradient(135deg,#ffd700,#ffaa00);color:#000;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-right:4px;}
.badge-him{background:linear-gradient(135deg,#c9a84c,#8b6914);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-right:4px;}

/* REACTIONS */
.rrow{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-top:6px;}
.rpill{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:2px 8px;font-size:13px;cursor:pointer;transition:all var(--tr);}
.rpill:hover{border-color:var(--accent);transform:scale(1.1);}
.radd{background:var(--bg3);border:1px solid var(--border);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;transition:all var(--tr);}
.radd:hover{border-color:var(--accent);}
.reaction-picker-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:9990;display:flex;align-items:center;justify-content:center;}
.reaction-picker-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;display:flex;gap:8px;box-shadow:0 0 40px var(--glow);}
.reaction-btn{font-size:28px;background:none;border:none;cursor:pointer;border-radius:8px;padding:6px;transition:transform .15s;}
.reaction-btn:hover{transform:scale(1.4);}

/* BUTTONS */
.btn-primary{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-family:var(--font-main);font-size:14px;font-weight:600;cursor:pointer;transition:all var(--tr);}
.btn-primary:hover{filter:brightness(1.2);box-shadow:0 0 15px var(--glow);transform:translateY(-1px);}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);border-radius:8px;padding:10px 20px;font-family:var(--font-main);font-size:14px;cursor:pointer;transition:all var(--tr);}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-warning{background:#f4a261;color:#000;border:none;border-radius:8px;padding:10px 20px;font-family:var(--font-main);cursor:pointer;font-weight:600;transition:all var(--tr);}
.btn-warning:hover{filter:brightness(1.1);}
.btn-danger{background:#e63946;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-family:var(--font-main);cursor:pointer;font-weight:600;transition:all var(--tr);}
.btn-danger:hover{filter:brightness(1.2);}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn-xs{padding:2px 8px;font-size:11px;}
.btn-full{width:100%;}
.btn-xl{padding:14px 36px;font-size:17px;margin:6px;}

/* INPUTS */
.input-field{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:var(--font-main);font-size:14px;width:100%;transition:all var(--tr);}
.input-field:focus{outline:none;border-color:var(--accent);box-shadow:0 0 10px var(--glow);}

/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:9000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:28px;max-width:440px;width:90%;display:flex;flex-direction:column;gap:14px;box-shadow:0 0 60px var(--glow);animation:modalIn .3s cubic-bezier(.175,.885,.32,1.275);}
@keyframes modalIn{from{transform:scale(.8) translateY(20px);opacity:0;}to{transform:scale(1) translateY(0);opacity:1;}}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;}
.auth-box{text-align:center;}
.auth-tabs{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:4px;}
.auth-tabs .tab-active{flex:1;background:var(--accent);color:#fff;border:none;padding:10px;cursor:pointer;font-family:var(--font-main);font-weight:600;}
.auth-tabs .tab-inactive{flex:1;background:var(--bg3);color:var(--text2);border:none;padding:10px;cursor:pointer;font-family:var(--font-main);}

/* EMPTY */
.empty-state{text-align:center;padding:40px;color:var(--text2);font-size:15px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px;text-align:center;}
.stat-num{font-size:36px;font-weight:900;font-family:var(--font-brand);}
.stat-lbl{font-size:12px;color:var(--text2);margin-top:4px;}

/* TOAST */
/* BROADCAST OVERLAY */
@keyframes bcIn{from{opacity:0;transform:scale(.85);}to{opacity:1;transform:scale(1);}}
@keyframes shimmer2{0%{background-position:200% center;}100%{background-position:-200% center;}}

/* VERIFY BADGE */
.vbadge-wrap{animation:badgePulse 3s ease-in-out infinite;}
@keyframes badgePulse{0%,100%{box-shadow:none;}50%{box-shadow:0 0 8px currentColor;}}

/* SEASONAL THEME OVERRIDES */
.theme-summer .brand-name{background:linear-gradient(135deg,#ff6b00,#ffaa00,#ff6b00);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:goldShimmer 3s linear infinite;}
.theme-summer .card{border-color:#3d150022;box-shadow:0 0 10px rgba(255,107,0,0.06);}
.theme-summer .card:hover{box-shadow:0 4px 30px rgba(255,107,0,0.2);border-color:#ff6b0066;}
.theme-summer .btn-primary{background:linear-gradient(135deg,#ff6b00,#ff4500);box-shadow:0 0 15px rgba(255,107,0,0.3);}
.theme-summer .section-header{text-shadow:0 0 20px #ff6b00,0 0 40px rgba(255,107,0,0.4);}

.theme-winter .brand-name{background:linear-gradient(135deg,#00aaff,#aaeeff,#00aaff);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:goldShimmer 4s linear infinite;}
.theme-winter .card:hover{box-shadow:0 4px 30px rgba(0,170,255,0.2);}
.theme-winter .btn-primary{background:linear-gradient(135deg,#00aaff,#0066cc);box-shadow:0 0 15px rgba(0,170,255,0.3);}
.theme-winter .section-header{text-shadow:0 0 20px #00aaff;}

.theme-autumn .brand-name{background:linear-gradient(135deg,#d4621a,#f0aa22,#d4621a);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:goldShimmer 3.5s linear infinite;}
.theme-autumn .card:hover{box-shadow:0 4px 30px rgba(212,98,26,0.25);}
.theme-autumn .btn-primary{background:linear-gradient(135deg,#d4621a,#a34a10);}
.theme-autumn .section-header{text-shadow:0 0 20px #d4621a;}

.theme-spring .brand-name{background:linear-gradient(135deg,#00cc66,#88ffaa,#00cc66);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:goldShimmer 3s linear infinite;}
.theme-spring .card:hover{box-shadow:0 4px 30px rgba(0,204,102,0.2);}
.theme-spring .btn-primary{background:linear-gradient(135deg,#00cc66,#009944);}
.theme-spring .section-header{text-shadow:0 0 20px #00cc66;}

.theme-void .brand-name{background:linear-gradient(135deg,#cc00ff,#8800cc,#cc00ff);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:goldShimmer 2.5s linear infinite;}
.theme-void .card{box-shadow:0 0 15px rgba(204,0,255,0.08);}
.theme-void .card:hover{box-shadow:0 0 30px rgba(204,0,255,0.3);border-color:#cc00ff66;}
.theme-void .btn-primary{background:linear-gradient(135deg,#cc00ff,#8800cc);box-shadow:0 0 20px rgba(204,0,255,0.4);}
.theme-void .section-header{text-shadow:0 0 20px #cc00ff,0 0 50px rgba(204,0,255,0.5);}
.theme-void .msg-mine .msg-bubble{background:linear-gradient(135deg,#1a0028,#0d0014);border-color:#cc00ff;box-shadow:0 0 15px rgba(204,0,255,0.3);}

(function(){
  const body = () => document.getElementById('dev-console-body');
  const panel = () => document.getElementById('dev-console');
  
  function addLine(msg, type='log'){
    const el = body(); if(!el) return;
    const time = new Date().toLocaleTimeString('en',{hour12:false});
    const div = document.createElement('div');
    div.className = 'dc-' + type;
    div.innerHTML = '<span class="dc-time">' + time + '</span> ' + String(msg).replace(/</g,'&lt;');
    el.appendChild(div);
    el.scrollTop = el.scrollHeight;
  }

  // Override console methods
  const _log = console.log.bind(console);
  const _warn = console.warn.bind(console);
  const _error = console.error.bind(console);
  const _info = console.info.bind(console);

  console.log = (...a) => { _log(...a); addLine(a.join(' '), 'log'); };
  console.warn = (...a) => { _warn(...a); addLine('⚠ ' + a.join(' '), 'warn'); };
  console.error = (...a) => { _error(...a); addLine('✖ ' + a.join(' '), 'error'); };
  console.info = (...a) => { _info(...a); addLine('ℹ ' + a.join(' '), 'info'); };

  // Catch uncaught errors
  window.addEventListener('error', e => {
    addLine('UNCAUGHT: ' + e.message + ' @ ' + e.filename + ':' + e.lineno, 'error');
  });
  window.addEventListener('unhandledrejection', e => {
    addLine('PROMISE: ' + (e.reason?.message || e.reason), 'error');
  });

  // Toggle with backtick key - ADMIN ONLY
  document.addEventListener('keydown', e => {
    if(e.key !== '`') return;
    const isAdmin = window.currentUserData?.role === 'admin';
    const p = panel(); if(!p) return;

  });

  // Clear button
  document.addEventListener('click', e => {
    if(e.target.id === 'dev-console-clear'){
      const el = body(); if(el) el.innerHTML = '';
    }
  });

  addLine('Console جاهز — اضغط ` في أي وقت', 'info');
})();

let _audioCtx=null;
function getAudioCtx(){
  if(!_audioCtx) _audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return _audioCtx;
}
function playNotifSound(type){
  try{
    const ctx=getAudioCtx();
    if(ctx.state==='suspended') ctx.resume();
    if(type==='message'){
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.type='sine';
      o.frequency.setValueAtTime(880,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(1100,ctx.currentTime+0.08);
      g.gain.setValueAtTime(0.15,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);
      o.start();o.stop(ctx.currentTime+0.3);
    } else if(type==='alert'){
      [0,0.18].forEach((t,i)=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.frequency.value=i===0?660:880;
        g.gain.setValueAtTime(0.2,ctx.currentTime+t);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+0.15);
        o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+0.15);
      });
    } else if(type==='report'){
      [0,0.12,0.24].forEach((t,i)=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.frequency.value=440+i*110;
        g.gain.setValueAtTime(0.2,ctx.currentTime+t);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+0.1);
        o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+0.1);
      });
    }
  }catch(e){}
}

function verifyBadgeHTML(badge,size=16){
  if(!badge||!VERIFY_BADGES[badge]) return '';

  const svg=BADGE_SVGS[badge]||'';
  return `<span class="vbadge-wrap" title="${b.label} Verified" style="display:inline-flex;align-items:center;gap:2px;background:${b.color}22;border:1px solid ${b.color}66;border-radius:20px;padding:1px 5px 1px 2px;margin-right:3px;vertical-align:middle;">${svg.replace('width="16" height="16"',`width="${size}" height="${size}"`)}<span style="font-size:9px;font-weight:800;color:${b.color};letter-spacing:.3px;">${b.label}</span></span>`;
}

// 🐦 BIRD NOTIFICATION — SVG animated bird
// ══════════════════════════════════════════════════
function spawnBird(msg='ابلاغ جديد!'){
  const old=document.getElementById('bird-notif'); if(old) old.remove();
  const wrap=document.createElement('div');
  wrap.id='bird-notif';
  wrap.style.cssText='position:fixed;top:0;left:-200px;z-index:99999;cursor:pointer;pointer-events:all;';
  wrap.innerHTML=`
    <div id="bird-inner" style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <svg id="bird-svg" width="60" height="40" viewBox="0 0 60 40" style="filter:drop-shadow(0 0 8px #00ff41);">
        <!-- body -->
        <ellipse cx="30" cy="25" rx="16" ry="10" fill="#1a1a1a" stroke="#00ff41" stroke-width="1.5"/>
        <!-- head -->
        <circle cx="46" cy="18" r="8" fill="#1a1a1a" stroke="#00ff41" stroke-width="1.5"/>
        <!-- beak -->
        <polygon points="53,17 60,19 53,21" fill="#ffd700"/>
        <!-- eye -->
        <circle cx="49" cy="17" r="2" fill="#00ff41"/>
        <circle cx="50" cy="16.5" r="0.7" fill="#000"/>
        <!-- left wing -->
        <path id="wing-left" d="M22 25 Q15 15 8 20 Q15 28 22 25Z" fill="#00ff41" opacity="0.9"/>
        <!-- right wing -->
        <path id="wing-right" d="M38 25 Q45 15 52 20 Q45 28 38 25Z" fill="#00ff41" opacity="0.9"/>
        <!-- tail -->
        <path d="M14 25 Q8 30 5 28 Q10 35 14 30Z" fill="#1a1a1a" stroke="#00ff41" stroke-width="1"/>
        <!-- envelope -->
        <rect x="16" y="28" width="18" height="12" rx="2" fill="#111" stroke="#ffd700" stroke-width="1.5"/>
        <path d="M16 28 L25 35 L34 28" fill="none" stroke="#ffd700" stroke-width="1.2"/>
      </svg>
      <div style="background:#0a0a0a;border:1px solid #00ff41;border-radius:8px;padding:6px 14px;font-size:12px;color:#00ff41;font-family:'Share Tech Mono',monospace;white-space:nowrap;box-shadow:0 0 15px rgba(0,255,65,0.4);">${msg}</div>
    </div>`;
  document.body.appendChild(wrap);

  // Wing flap animation via JS
  let wingUp=true;
  const flapInt=setInterval(()=>{
    const wl=document.getElementById('wing-left');
    const wr=document.getElementById('wing-right');
    if(!wl){clearInterval(flapInt);return;}
    if(wingUp){
      wl.setAttribute('d','M22 25 Q15 10 8 15 Q15 23 22 25Z');
      wr.setAttribute('d','M38 25 Q45 10 52 15 Q45 23 38 25Z');
    } else {
      wl.setAttribute('d','M22 25 Q15 15 8 20 Q15 28 22 25Z');
      wr.setAttribute('d','M38 25 Q45 15 52 20 Q45 28 38 25Z');
    }
    wingUp=!wingUp;
  },200);

  // Fly path: enter from left, loop across screen, exit
  const W=window.innerWidth;
  const H=window.innerHeight;
  let t=0, phase=0;
  const flyInt=setInterval(()=>{
    t+=0.012;
    let x, y;
    if(phase===0){
      // Enter from left
      x = -160 + t*(W+200)*0.8;
      y = H*0.12 + Math.sin(t*3)*40;
      if(x > W*0.5) phase=1;
    } else if(phase===1){
      // Loop around
      x = W*0.5 + Math.cos(t*1.5)*W*0.35;
      y = H*0.15 + Math.sin(t*2)*60;
      if(t>2.5) phase=2;
    } else {
      // Exit right
      x = W*0.85 + (t-2.5)*600;
      y = H*0.1 + Math.sin(t*4)*30;
    }
    wrap.style.left = x+'px';
    wrap.style.top  = y+'px';
    // Flip bird based on direction
    const birdSvg=document.getElementById('bird-svg');
    if(birdSvg){
      if(phase===1 && Math.cos(t*1.5)<0) birdSvg.style.transform='scaleX(-1)';
      else birdSvg.style.transform='scaleX(1)';
    }
    if(x > W+200){ clearInterval(flyInt); clearInterval(flapInt); wrap.remove(); }
  },16);

  wrap.onclick=()=>{ clearInterval(flyInt); clearInterval(flapInt); wrap.remove(); showSection('admin'); };
  setTimeout(()=>{ clearInterval(flyInt); clearInterval(flapInt); wrap.remove(); },12000);
}

// Watch reports for admin
let lastReportCount=0;
function watchReportsForAdmin(){
  if(currentUserData?.role!=='admin') return;
  const q=query(collection(db,'reports'),where('status','==','pending'),orderBy('createdAt','desc'));
  onSnapshot(q,snap=>{
    const badge=document.getElementById('report-badge');
    if(badge) badge.textContent=snap.size>0?snap.size:'';
    if(snap.size>lastReportCount && lastReportCount>=0 && snap.size>0){
      // Only show bird after initial load
      if(lastReportCount>0){ const rd=snap.docs[0]?.data()||{}; spawnGoldenBird(rd); playNotifSound('report'); }
    }
    lastReportCount=snap.size;
  });
}

// Watch for user punishment notifications (mute lifted / extended)
function watchMyPunishments(){
  if(!currentUserData) return;
  let prevMute=null;
  onSnapshot(doc(db,'users',currentUserData.uid),snap=>{
    const d=snap.data(); if(!d) return;
    const newMute=d.muteUntil;
    if(prevMute!==null){
      if(!newMute && prevMute){
        showLuciferMessage('pardon');
      } else if(newMute && prevMute && newMute!==prevMute){
        showLuciferMessage('wrath');
      }
    }
    prevMute=newMute;
    currentUserData={...currentUserData,...d};
  });
}

function showLuciferMessage(type){
  const old=document.getElementById('lucifer-msg'); if(old) old.remove();
  const overlay=document.createElement('div');
  overlay.id='lucifer-msg';
  const isPardon=type==='pardon';
  overlay.style.cssText=`position:fixed;top:0;left:0;width:100%;height:100%;z-index:999999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);`;
  overlay.innerHTML=`
    <div style="text-align:center;padding:40px;max-width:500px;animation:luciferIn 0.5s ease;">
      <div style="font-size:80px;margin-bottom:20px;filter:drop-shadow(0 0 30px ${isPardon?'#ffd700':'#e63946'});">
        ${isPardon?'😇':'😈'}
      </div>
      <div style="font-family:'Cinzel Decorative',serif;font-size:clamp(16px,3vw,28px);color:${isPardon?'#ffd700':'#e63946'};text-shadow:0 0 30px ${isPardon?'#ffd700':'#e63946'};line-height:1.6;letter-spacing:2px;">
        ${isPardon?'السيد لوسيفر صفح عنك':'السيد لوسيفر يصب عليك جام غضبه'}
      </div>
      <div style="margin-top:20px;color:${isPardon?'#cca040':'#9999aa'};font-size:14px;">
        ${isPardon?'🕊️ أنت حر الآن — استخدم هذه الحرية بحكمة':'⚠️ لقد طالت يد العدالة — كن أكثر حذراً'}
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.onclick=()=>overlay.remove();
  setTimeout(()=>overlay.remove(), 5000);
}

// MUTE CHECK

async function isMuted(){
  if(!currentUserData) return false;
  const snap=await getDoc(doc(db,'users',currentUserData.uid));
  const u=snap.data(); if(!u||!u.muteUntil) return false;
  const mu=u.muteUntil.toDate?u.muteUntil.toDate():new Date(u.muteUntil);
  if(mu>new Date()){
    const mins=Math.ceil((mu-new Date())/60000);
    showToast(`🔇 مكتوم لمدة ${mins} دقيقة أخرى`,'warning');
    return true;
  }
  return false;
}

async function checkBanned(){
  try{
    const snap=await getDoc(doc(db,'banned_fingerprints',DEVICE_FP));
    if(!snap.exists()) return false;
    const d=snap.data(); const now=new Date();
    if(d.permanent) return true;
    if(d.until){ const u=d.until.toDate?d.until.toDate():new Date(d.until); if(u>now) return true; }
    return false;
  }catch(e){ return false; }
}

async function registerUser(email,password,name,nickname){
  if(await checkBanned()) throw new Error('هذا الجهاز محظور.');
  const cred=await createUserWithEmailAndPassword(auth,email,password);
  const uid=cred.user.uid; const isAdmin=email===ADMIN_EMAIL;
  const ud={uid,email,name,nickname:nickname||name,avatar:'',theme:isAdmin?'him':'default',
    role:isAdmin?'admin':'user',permissions:{canUseChosenTheme:isAdmin,chatAccess:true},
    fingerprint:DEVICE_FP,createdAt:new Date().toISOString(),banned:false,muteUntil:null};
  await setDoc(doc(db,'users',uid),ud);
  await setDoc(doc(db,'fingerprints',DEVICE_FP),{uid,active:true});
  return ud;
}
async function loginUser(email,password){
  if(await checkBanned()) throw new Error('هذا الجهاز محظور.');
  const cred=await signInWithEmailAndPassword(auth,email,password);
  return cred.user;
}
async function loadUserData(uid){
  const snap=await getDoc(doc(db,'users',uid));
  return snap.exists()?snap.data():null;
}

function showSection(name){
  currentSection=name;
  document.querySelectorAll('.nav-item,.bnav-item').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll(`[data-section="${name}"]`).forEach(el=>el.classList.add('active'));

  ({feed:renderFeed,chat:renderPublicChat,private:renderPrivateList,groups:renderGroups,
    themes:renderThemes,admin:renderAdmin,profile:renderProfile,search:renderSearch,
    events:renderEvents,leaderboard:renderLeaderboard,suggestions:renderSuggestions,
    friends:renderFriends,following:renderFollowingFeed})[name]?.();
}

function renderSearch(){
  document.getElementById('main-content').innerHTML=`
    <div class="section-header"><span>🔍</span> البحث العالمي</div>
    <div class="card" style="margin-bottom:16px;">
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <input type="text" id="search-input" placeholder="ابحث..." class="input-field" style="flex:1;" oninput="doSearch(this.value)">
        <div style="display:flex;gap:6px;">
          <button class="btn-ghost btn-sm" id="srch-users" style="border-color:var(--accent);color:var(--accent);" onclick="setSearchFilter('users')">👤 مستخدمون</button>
          <button class="btn-ghost btn-sm" id="srch-posts" onclick="setSearchFilter('posts')">📰 منشورات</button>
        </div>
      </div>
    </div>
    <div id="search-results"></div>`;
}
let _searchFilter='users', _searchTimeout=null;
function setSearchFilter(f){
  _searchFilter=f;
  ['users','posts'].forEach(x=>{
    const b=document.getElementById('srch-'+x);
    if(b){b.style.borderColor=x===f?'var(--accent)':'var(--border)';b.style.color=x===f?'var(--accent)':'var(--text2)';}
  });
  const v=document.getElementById('search-input')?.value;
  if(v&&v.trim()) _doSearchActual(v.trim());
}
function doSearch(val){
  clearTimeout(_searchTimeout);
  if(!val.trim()){const el=document.getElementById('search-results');if(el)el.innerHTML='';return;}
  _searchTimeout=setTimeout(()=>_doSearchActual(val.trim()),400);
}
async function _doSearchActual(val){
  const el=document.getElementById('search-results'); if(!el) return;
  el.innerHTML='<div class="empty-state">جار البحث...</div>';
  const lower=val.toLowerCase();
  if(_searchFilter==='users'){
    const snap=await getDocs(query(collection(db,'users'),limit(100)));
    const results=[];
    snap.forEach(d=>{const u=d.data();if((u.nickname||u.name||'').toLowerCase().includes(lower)||(u.email||'').toLowerCase().includes(lower))results.push(u);});
    if(!results.length){el.innerHTML='<div class="empty-state">لا نتائج</div>';return;}
    el.innerHTML=results.slice(0,20).map(u=>`
      <div class="card" style="display:flex;align-items:center;gap:12px;margin-bottom:10px;padding:12px;">
        <div style="position:relative;">${avatar(u.avatar,u.name,42)}${u.status?`<span style="position:absolute;bottom:0;right:0;width:11px;height:11px;border-radius:50%;background:${STATUS_MAP[u.status]?.color||'#00cc41'};border:2px solid var(--bg2);"></span>`:''}
        </div>
        <div style="flex:1;">
          <div style="font-weight:700;">${esc(u.nickname||u.name)} ${verifyBadgeHTML(u.verifyBadge)} ${badgeHTML(u.theme)}</div>
          <div style="font-size:11px;color:var(--text2);">${esc(u.email)}</div>
          ${u.status?`<div style="font-size:11px;color:var(--text2);">${STATUS_MAP[u.status]?.label||''}</div>`:''}
        </div>
        <button class="btn-ghost btn-sm" onclick="startPrivateChat('${u.uid}','${esc(u.nickname||u.name)}','${esc(u.avatar||'')}')">💬</button>
      </div>`).join('');
  } else {
    const snap=await getDocs(query(collection(db,'posts'),orderBy('createdAt','desc'),limit(100)));
    const results=[];
    snap.forEach(d=>{const p={id:d.id,...d.data()};if((p.text||'').toLowerCase().includes(lower))results.push(p);});
    if(!results.length){el.innerHTML='<div class="empty-state">لا نتائج</div>';return;}
    el.innerHTML=''; results.slice(0,20).forEach(p=>el.appendChild(createPostEl(p)));
  }
}
function startPrivateChat(uid,name,av){
  showSection('private');
  setTimeout(()=>openPrivateChat({uid,name,nickname:name,avatar:av,email:''}),300);
}

const REPORT_REASONS=['سبام 🗑️','تحرش وإزعاج 😤','سب وشتيمة 🤬','محتوى غير لائق 🔞','انتحال شخصية 🎭','تهديد وترهيب 😱','معلومات مضللة ❌','أخرى...'];
window._selReasons=[];
function showReportModal(tid,ttype,tcontent=''){
  document.getElementById('modal').innerHTML=`
    <div class="modal-box">
      <h3>🚩 الإبلاغ</h3>
      <p style="color:var(--text2);font-size:13px;">"${esc(tcontent.slice(0,60))}"</p>
      <div class="report-reasons">${REPORT_REASONS.map((r,i)=>`<button class="reason-btn" id="rr-${i}" onclick="selectReason(${i})">${r}</button>`).join('')}</div>
      <textarea id="report-detail" placeholder="تفاصيل إضافية..." class="composer-input" style="margin-top:10px;min-height:60px;"></textarea>
      <div class="modal-actions">
        <button class="btn-primary" onclick="submitReport('${tid}','${ttype}','${esc(tcontent.slice(0,200))}')">إرسال</button>
        <button class="btn-ghost" onclick="closeModal()">إلغاء</button>
      </div>
    </div>`;
  document.getElementById('modal').style.display='flex';
  window._selReasons=[];
}
function selectReason(i){
  const idx=window._selReasons.indexOf(i);
  const btn=document.getElementById('rr-'+i);
  if(idx>=0){window._selReasons.splice(idx,1);btn.classList.remove('reason-active');}
  else{window._selReasons.push(i);btn.classList.add('reason-active');}
}
async function submitReport(tid,ttype,tcontent){
  if(!currentUserData) return;
  if(!window._selReasons.length){showToast('اختر سبباً واحداً على الأقل','warning');return;}
  await addDoc(collection(db,'reports'),{
    targetId:tid,targetType:ttype,targetContent:tcontent,
    reasons:window._selReasons.map(i=>REPORT_REASONS[i]),
    detail:document.getElementById('report-detail')?.value||'',
    reportedBy:currentUserData.uid,reportedByName:currentUserData.nickname||currentUserData.name,
    status:'pending',createdAt:serverTimestamp()
  });
  closeModal(); showToast('✅ تم الإبلاغ','success');
}

function previewPostImg(inp){
  const file=inp.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    postImageB64=e.target.result;
    postImageName=file.name;
    document.getElementById('post-img-prev').innerHTML=`
      <div style="position:relative;display:inline-block;">
        <img src="${postImageB64}" style="max-height:110px;border-radius:8px;border:1px solid var(--border);">
        <button onclick="removePostImg()" style="position:absolute;top:-6px;right:-6px;background:var(--accent);border:none;border-radius:50%;width:20px;height:20px;cursor:pointer;color:#fff;font-size:13px;line-height:19px;text-align:center;font-weight:700;">×</button>
      </div>`;
  };
  reader.readAsDataURL(file);
}
function removePostImg(){
  postImageB64=null; postImageName=null;
  const el=document.getElementById('post-img-prev'); if(el) el.innerHTML='';
  const inp=document.getElementById('post-img-inp'); if(inp) inp.value='';
}

async function submitPost(){
  if(await isMuted()) return;
  const text=document.getElementById('post-text')?.value?.trim();
  if(!text&&!postImageB64) return;
  await addDoc(collection(db,'posts'),{
    text:text||'', imageB64:postImageB64||'',
    authorId:currentUserData.uid, authorName:currentUserData.name,
    authorNickname:currentUserData.nickname, authorAvatar:currentUserData.avatar||'',

function loadFeed(){
  const feedEl=document.getElementById('posts-feed'); if(!feedEl) return;
  const q=query(collection(db,'posts'),orderBy('createdAt','desc'),limit(60));
  const unsub=onSnapshot(q,snap=>{
    if(!feedEl) return; feedEl.innerHTML='';
    const posts=[]; snap.forEach(d=>posts.push({id:d.id,...d.data()}));
    const pinned=posts.filter(p=>p.pinned);
    const normal=posts.filter(p=>!p.pinned);
    [...pinned,...normal].forEach(p=>feedEl.appendChild(createPostEl(p)));
  });
  unsubscribers.push(unsub);
}

let chatImgB64=null;
function previewChatImg(inp){
  const f=inp.files[0]; if(!f) return;
  // limit to 400KB
  if(f.size>400*1024){showToast('الصورة كبيرة (أقصى 400KB)','warning');return;}
  const rd=new FileReader(); rd.onload=e=>{
    chatImgB64=e.target.result;
    const prev=document.getElementById('chat-img-prev');
    const img=document.getElementById('chat-img-preview-img');
    if(prev&&img){prev.style.display='block';img.src=chatImgB64;}
  }; rd.readAsDataURL(f);

function loadPublicChat(){
  const msgEl=document.getElementById('pub-messages'); if(!msgEl) return;
  msgEl.innerHTML='';
  const r=ref(rtdb,'public_chat');
  let initialized=false;
  const listener=onValue(r,snap=>{
    const msgElNow=document.getElementById('pub-messages'); if(!msgElNow) return;
    // Build map of new messages
    const newMsgs={};
    snap.forEach(c=>{ newMsgs[c.key]={id:c.key,...c.val()}; });
    // Remove deleted
    msgElNow.querySelectorAll('[data-mid]').forEach(el=>{
      if(!newMsgs[el.dataset.mid]) el.remove();
    });
    // Add new ones (keep order)
    const allIds=Object.keys(newMsgs).sort((a,b)=>newMsgs[a].timestamp-newMsgs[b].timestamp);
    const existingIds=new Set([...msgElNow.querySelectorAll('[data-mid]')].map(e=>e.dataset.mid));
    let added=false;
    allIds.forEach(id=>{
      if(!existingIds.has(id)){
        const el=createChatMsg(newMsgs[id],'public_chat');
        // Insert in correct position
        const nextId=allIds[allIds.indexOf(id)+1];
        const nextEl=nextId?msgElNow.querySelector(`[data-mid="${nextId}"]`):null;
        if(nextEl) msgElNow.insertBefore(el,nextEl);
        else msgElNow.appendChild(el);
        added=true;
      }
    });
    if(added){
      if(initialized) playNotifSound('message');
      msgElNow.scrollTop=msgElNow.scrollHeight;
    }
    initialized=true;
  });
  unsubscribers.push(()=>off(r,'value',listener));
}

async function handleChatCommand(text){
  const parts=text.trim().split(/\s+/);
  const cmd=parts[0];
  const role=currentUserData?.role;
  const perms=currentUserData?.permissions||{};
  const isAdmin=role==='admin'||role==='co-admin'||perms.canUseCommands;
  const isOwner=role==='admin';

  if(cmd==='?مساعدة'||cmd==='?help'||cmd==='?اوامر'){
    const avail=Object.entries(CHAT_COMMANDS).filter(([,v])=>!v.adminOnly||isAdmin);
    const m=document.getElementById('modal');if(!m)return true;
    m.innerHTML=`<div class="modal-box" style="max-width:540px;">
      <h3 style="color:var(--accent);font-family:var(--font-brand);margin-bottom:14px;">⚡ أوامر LuciferNet</h3>
      <div style="display:grid;gap:8px;max-height:65vh;overflow-y:auto;">
        ${avail.map(([k,v])=>`<div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;">
          <div style="font-size:13px;color:var(--accent);font-weight:700;">${k}${v.adminOnly?'<span style="color:#ff6600;font-size:10px;margin-right:8px;background:#ff660022;padding:1px 6px;border-radius:4px;">أدمن</span>':''}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:3px;">${v.desc}</div>
          <div style="font-size:11px;color:#555;margin-top:2px;font-family:monospace;">${v.usage}</div>
        </div>`).join('')}
      </div>
      <div class="modal-actions"><button class="btn-ghost" onclick="closeModal()">إغلاق</button></div>
    </div>`;
    m.style.display='flex';return true;
  }

  if(!isAdmin){showToast('❌ هذا الأمر للأدمن فقط','error');return true;}

  async function findUser(name){
    const s1=await getDocs(query(collection(db,'users'),where('nickname','==',name),limit(1)));
    if(!s1.empty)return s1.docs[0];
    const s2=await getDocs(query(collection(db,'users'),where('name','==',name),limit(1)));
    return s2.empty?null:s2.docs[0];
  }
  async function findByEmail(email){
    const s=await getDocs(query(collection(db,'users'),where('email','==',email),limit(1)));
    return s.empty?null:s.docs[0];
  }

  if(cmd==='?بان'){
    const name=parts[1],dur=parseInt(parts[2])||60;
    if(!name){showToast('الاستخدام: ?بان [اسم] [دقائق]','warning');return true;}
    const d=await findUser(name);if(!d){showToast('مستخدم غير موجود: '+name,'error');return true;}
    await updateDoc(doc(db,'users',d.data().uid||d.id),{banned:true,banExpiry:Date.now()+dur*60000,banReason:'حظر من الشات'});
    showToast('✅ تم حظر '+name+' لـ '+dur+' دقيقة','success');return true;
  }
  if(cmd==='?كتم'){
    const name=parts[1],dur=parseInt(parts[2])||30;
    if(!name){showToast('الاستخدام: ?كتم [اسم] [دقائق]','warning');return true;}
    const d=await findUser(name);if(!d){showToast('مستخدم غير موجود: '+name,'error');return true;}
    await updateDoc(doc(db,'users',d.data().uid||d.id),{muted:true,muteExpiry:Date.now()+dur*60000});
    showToast('✅ تم كتم '+name+' لـ '+dur+' دقيقة','success');return true;
  }
  if(cmd==='?فك_بان'){
    const name=parts[1];if(!name)return true;
    const d=await findUser(name);
    if(d){await updateDoc(doc(db,'users',d.data().uid||d.id),{banned:false,banExpiry:null});showToast('✅ تم فك حظر '+name,'success');}
    return true;
  }
  if(cmd==='?فك_كتم'){
    const name=parts[1];if(!name)return true;
    const d=await findUser(name);
    if(d){await updateDoc(doc(db,'users',d.data().uid||d.id),{muted:false,muteExpiry:null});showToast('✅ تم فك كتم '+name,'success');}
    return true;
  }
  if(cmd==='?مسح_شات'){
    if(confirm('مسح كل الشات؟'))await remove(ref(rtdb,'public_chat'));
    showToast('✅ تم','success');return true;
  }
  if(cmd==='?اغلاق'){await set(ref(rtdb,'chat_status/closed'),true);showToast('🔒 تم إغلاق الشات','success');return true;}
  if(cmd==='?فتح'){await set(ref(rtdb,'chat_status/closed'),false);showToast('🔓 تم فتح الشات','success');return true;}
  if(cmd==='?رانك'){
    const name=parts[1],rankName=parts[2];
    if(!name||!rankName){showToast('الاستخدام: ?رانك [اسم] [رانك]','warning');return true;}
    const d=await findUser(name);if(!d){showToast('مستخدم غير موجود','error');return true;}
    const uid=d.data().uid||d.id;
    const ur=[...(d.data().unlockedRanks||[])];if(!ur.includes(rankName))ur.push(rankName);
    await updateDoc(doc(db,'users',uid),{rank:rankName,unlockedRanks:ur});
    showToast('✅ تم منح رانك "'+rankName+'" لـ '+name,'success');return true;
  }
  if(cmd==='?ثيم'){
    const name=parts[1],themeName=parts[2];
    if(!name||!themeName){showToast('الاستخدام: ?ثيم [اسم] [ثيم]','warning');return true;}
    const d=await findUser(name);if(!d){showToast('مستخدم غير موجود','error');return true;}
    const p2={...(d.data().permissions||{})};p2[themeName+'_unlocked']=true;
    await updateDoc(doc(db,'users',d.data().uid||d.id),{permissions:p2});
    showToast('✅ تم منح ثيم "'+themeName+'" لـ '+name,'success');return true;
  }
  if(cmd==='?بث'){
    const msg=parts.slice(1).join(' ');if(!msg)return true;
    await push(ref(rtdb,'public_chat'),{text:'📢 '+msg,uid:'system',name:'🤖 النظام',nickname:'النظام',avatar:'',reactions:{},timestamp:Date.now()});
    return true;
  }
  if(cmd==='?فعالية'){
    const gameName=parts[1];
    const g=GAMES_LIST.find(x=>x.id===gameName||x.name.includes(gameName||''));
    if(!g){showToast('لعبة غير موجودة: '+(gameName||''),'error');return true;}
    await addDoc(collection(db,'events'),{type:'mini',gameIds:[g.id],gameId:g.id,title:'🚀 فعالية سريعة — '+g.name,prizeType:'',prizeValue:'',prizeLabel:'',status:'active',endTime:Date.now()+600000,winners:[],createdBy:currentUserData.uid,createdAt:serverTimestamp()});
    showToast('✅ تم إطلاق فعالية '+g.name,'success');return true;
  }
  if(cmd==='?كتم_كل'){
    const dur=parseInt(parts[1])||60;
    if(!confirm('كتم جميع المستخدمين '+dur+' دقيقة؟'))return true;
    const snap=await getDocs(query(collection(db,'users'),where('role','!=','admin')));
    const until=new Date(Date.now()+dur*60000);
    await Promise.all(snap.docs.map(d2=>updateDoc(doc(db,'users',d2.id),{muteUntil:until})));
    showToast('🔇 تم كتم الجميع','success');return true;
  }
  if(cmd==='?فك_كتم_كل'){
    if(!confirm('رفع الكتم عن الجميع؟'))return true;
    const snap=await getDocs(collection(db,'users'));
    await Promise.all(snap.docs.map(d2=>updateDoc(doc(db,'users',d2.id),{muteUntil:null,muted:false})));
    showToast('🔊 تم','success');return true;
  }
  if(cmd==='?ادمن'){
    if(!isOwner){showToast('❌ للأونر فقط','error');return true;}
    const email=parts[1];if(!email)return true;
    const d=await findByEmail(email);if(!d){showToast('غير موجود','error');return true;}
    await updateDoc(doc(db,'users',d.id),{role:'co-admin','permissions.canUseCommands':true,'permissions.canUseConsole':true});
    showToast('✅ تم منح Co-Admin لـ '+d.data().name,'success');return true;
  }
  if(cmd==='?مود'){
    if(!isOwner){showToast('❌ للأونر فقط','error');return true;}
    const email=parts[1];if(!email)return true;
    const d=await findByEmail(email);if(!d){showToast('غير موجود','error');return true;}
    await updateDoc(doc(db,'users',d.id),{role:'mod','permissions.canUseCommands':true});
    showToast('✅ تم منح Mod لـ '+d.data().name,'success');return true;
  }
  if(cmd==='?فك_صلاحيه'){
    if(!isOwner){showToast('❌ للأونر فقط','error');return true;}
    const email=parts[1];if(!email)return true;
    const d=await findByEmail(email);if(!d){showToast('غير موجود','error');return true;}
    await updateDoc(doc(db,'users',d.id),{role:'user',permissions:{}});
    showToast('✅ تم سحب الصلاحيات','success');return true;
  }
  return false;
}

async function sendPublicMsg(){

function openPrivateChat(other){
  const panel=document.getElementById('private-chat-panel'); if(!panel) return;
  const cid=getChatId(currentUserData.uid,other.uid); activeChatId=cid;
  panel.innerHTML=`
    <div class="chat-header">${avatar(other.avatar,other.name,34)}<span style="font-weight:700;">${esc(other.nickname||other.name)}</span>
      <button class="btn-ghost btn-xs" style="margin-right:auto;" onclick="showReportModal('${other.uid}','user','${esc(other.name)}')">🚩</button>

    <div class="chat-input-area">

      <button class="btn-primary" onclick="sendPrivateMsg('${cid}','${other.uid}')">إرسال</button>
    </div>`;
  const r=ref(rtdb,'private_chats/'+cid);
  if(chatListeners[cid]) off(chatListeners[cid]);
  chatListeners[cid]=r;
  let _privInit=false;
  onValue(r,snap=>{
    const msgEl=document.getElementById('priv-messages'); if(!msgEl) return;
    const newMsgs={};
    snap.forEach(c=>{ newMsgs[c.key]={id:c.key,...c.val()}; });
    const msgElNow=document.getElementById('priv-messages'); if(!msgElNow) return;
    msgElNow.querySelectorAll('[data-mid]').forEach(el=>{ if(!newMsgs[el.dataset.mid]) el.remove(); });
    const allIds=Object.keys(newMsgs).sort((a,b)=>newMsgs[a].timestamp-newMsgs[b].timestamp);
    const existingIds=new Set([...msgElNow.querySelectorAll('[data-mid]')].map(e=>e.dataset.mid));
    let added=false;
    allIds.forEach(id=>{
      if(!existingIds.has(id)){
        const el=createChatMsg(newMsgs[id],'private_chats/'+cid);
        const nextId=allIds[allIds.indexOf(id)+1];
        const nextEl=nextId?msgElNow.querySelector(`[data-mid="${nextId}"]`):null;
        if(nextEl) msgElNow.insertBefore(el,nextEl); else msgElNow.appendChild(el);
        added=true;
      }
    });
    if(added){ if(_privInit) playNotifSound('message'); msgElNow.scrollTop=msgElNow.scrollHeight; }
    _privInit=true;
  });
}

// ══ LEADERBOARD ══
async function countActivity(type){
  if(!currentUserData) return;
  const uid=currentUserData.uid;
  const week=getWeekKey();
  const r=ref(rtdb,`leaderboard/${week}/${uid}`);
  const snap=await get(r);
  const d=snap.val()||{uid,name:currentUserData.nickname||currentUserData.name,avatar:currentUserData.avatar||'',score:0,msgs:0,posts:0};
  if(type==='message') d.msgs=(d.msgs||0)+1;
  if(type==='post') d.posts=(d.posts||0)+1;
  d.score=(d.msgs||0)*1+(d.posts||0)*2;
  await set(r,d);
}
function getWeekKey(){
  const now=new Date(); const y=now.getFullYear();
  const w=Math.ceil((((now-new Date(y,0,1))/86400000)+new Date(y,0,1).getDay()+1)/7);
  return `${y}_W${w}`;
}
async function renderLeaderboard(){
  document.getElementById('main-content').innerHTML=`
    <div class="section-header"><span>🏆</span> لوحة المتصدرين</div>
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
      <button class="btn-primary btn-sm" onclick="loadLeaderboard('week')">📅 هذا الأسبوع</button>
      <button class="btn-ghost btn-sm" onclick="loadLeaderboard('month')">📆 هذا الشهر</button>
      <button class="btn-ghost btn-sm" onclick="loadLeaderboard('events')">🎮 الفعاليات</button>
    </div>
    <div id="lb-content"><div class="empty-state">جار التحميل...</div></div>`;
  loadLeaderboard('week');
}
async function loadLeaderboard(type){
  const el=document.getElementById('lb-content'); if(!el) return;
  el.innerHTML='<div class="empty-state">جار التحميل...</div>';
  let data=[];
  if(type==='week'||type==='month'){
    const key=type==='week'?getWeekKey():getMonthKey();
    const snap=await get(ref(rtdb,`leaderboard/${key}`));
    if(snap.exists()) snap.forEach(c=>data.push(c.val()));
    data.sort((a,b)=>b.score-a.score);
  } else {
    // Events points
    const snap=await getDocs(query(collection(db,'event_points'),orderBy('points','desc'),limit(50)));
    snap.forEach(d=>data.push({uid:d.id,...d.data(),score:d.data().points}));
  }
  if(!data.length){el.innerHTML='<div class="empty-state">لا يوجد نشاط بعد 🌙</div>';return;}
  const medals=['🥇','🥈','🥉'];
  el.innerHTML=data.slice(0,50).map((u,i)=>`
    <div class="lb-row card" style="${i===0?'border-color:#ffd700;box-shadow:0 0 20px rgba(255,215,0,.3);':i===1?'border-color:#c0c0c0;':i===2?'border-color:#cd7f32;':''}">
      <div class="lb-rank">${medals[i]||('#'+(i+1))}</div>
      <div style="font-size:32px;">${u.avatar?`<img src="${u.avatar}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;">`:u.name?u.name[0]:'?'}</div>
      <div style="flex:1;"><div style="font-weight:700;">${esc(u.name||'مجهول')}</div>
        <div style="font-size:11px;color:var(--text2);">${type!=='events'?`💬 ${u.msgs||0} رسالة &nbsp;📰 ${u.posts||0} منشور`:`🎮 ${u.points||0} نقطة فعالية`}</div>
      </div>
      <div class="lb-score">${u.score||0}</div>
    </div>`).join('');
}
function getMonthKey(){
  const n=new Date(); return `${n.getFullYear()}_M${n.getMonth()+1}`;
}

async function renderSuggestions(){
  document.getElementById('main-content').innerHTML=`
    <div class="section-header"><span>💡</span> اقتراحات المجتمع</div>
    <div class="card" style="margin-bottom:16px;">
      <h4 style="color:var(--accent);margin-bottom:10px;">✍️ اقترح ميزة جديدة</h4>
      <textarea id="sug-text" class="composer-input" placeholder="اكتب اقتراحك هنا..." style="min-height:70px;margin-bottom:10px;"></textarea>
      <button class="btn-primary" onclick="submitSuggestion()">إرسال الاقتراح 💡</button>
    </div>
    <div id="sug-list"><div class="empty-state">جار التحميل...</div></div>`;
  loadSuggestions();
}
async function submitSuggestion(){
  if(!currentUserData){showToast('يجب تسجيل الدخول','error');return;}
  const text=document.getElementById('sug-text')?.value?.trim();
  if(!text){showToast('اكتب اقتراحاً أولاً','warning');return;}
  try{
    await addDoc(collection(db,'suggestions'),{
      text,authorId:currentUserData.uid,authorName:currentUserData.nickname||currentUserData.name,
      stars:[],starCount:0,createdAt:serverTimestamp()
    });
    document.getElementById('sug-text').value='';
    showToast('✅ تم إرسال اقتراحك','success');
  }catch(e){showToast('خطأ في الإرسال: '+e.message,'error');}
}
function loadSuggestions(){
  const el=document.getElementById('sug-list'); if(!el) return;
  const q=query(collection(db,'suggestions'),orderBy('starCount','desc'),orderBy('createdAt','desc'),limit(50));
  const unsub=onSnapshot(q,snap=>{
    if(!document.getElementById('sug-list')) return;
    el.innerHTML='';
    if(snap.empty){el.innerHTML='<div class="empty-state">لا توجد اقتراحات بعد 💭</div>';return;}
    snap.forEach(d=>{
      const s={id:d.id,...d.data()};
      const myStarred=(s.stars||[]).includes(currentUserData.uid);
      const div=document.createElement('div');div.className='card sug-card';
      div.innerHTML=`
        <div style="display:flex;align-items:flex-start;gap:12px;">
          <button class="star-btn ${myStarred?'starred':''}" onclick="toggleStar('${s.id}',${myStarred})" style="background:${myStarred?'rgba(255,215,0,.2)':'transparent'};border:1px solid ${myStarred?'#ffd700':'var(--border)'};border-radius:20px;padding:4px 10px;cursor:pointer;color:${myStarred?'#ffd700':'var(--text2)'};transition:all .2s;flex-shrink:0;">
            ⭐ <span>${s.starCount||0}</span>
          </button>
          <div style="flex:1;">
            <div style="font-size:14px;line-height:1.6;margin-bottom:6px;">${esc(s.text)}</div>
            <div style="font-size:11px;color:var(--text2);">💡 ${esc(s.authorName)} — ${timeSince(s.createdAt)}</div>
          </div>
          ${currentUserData?.role==='admin'?`<button class="btn-danger btn-xs" onclick="deleteSuggestion('${s.id}')">🗑</button>`:''}
        </div>`;
      el.appendChild(div);
    });
  });
  unsubscribers.push(unsub);
  // Event delegation for star + delete buttons
}
async function toggleStar(id,wasStarred){
  const ref_=doc(db,'suggestions',id);
  const snap=await getDoc(ref_); const d=snap.data();
  const stars=d.stars||[];
  if(wasStarred) stars.splice(stars.indexOf(currentUserData.uid),1);
  else if(!stars.includes(currentUserData.uid)) stars.push(currentUserData.uid);
  await updateDoc(ref_,{stars,starCount:stars.length});
}
async function deleteSuggestion(id){
  await deleteDoc(doc(db,'suggestions',id));
  showToast('✅ تم الحذف','success');
}

function updateEventTimer(eid,endTime){
  const el=document.getElementById('etimer-'+eid); if(!el) return;
  const update=()=>{
    const el2=document.getElementById('etimer-'+eid); if(!el2) return;
    const diff=endTime-Date.now();
    if(diff<=0){el2.textContent='⏰ انتهى الوقت';return;}
    const h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
    el2.textContent=`⏱ ${h?h+'س ':''} ${m}د ${s}ث`;
    setTimeout(update,1000);
  };
  update();
}

// ── CINEMATIC COUNTDOWN ──
function showCinematicCountdown(cb){
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;z-index:999999;background:#000;display:flex;align-items:center;justify-content:center;flex-direction:column;';
  document.body.appendChild(ov);
  let count=5;
  const render=()=>{
    ov.innerHTML=`
      <div style="text-align:center;">
        <div style="font-family:'Cinzel Decorative',serif;font-size:clamp(20px,4vw,30px);color:#666;letter-spacing:6px;margin-bottom:30px;text-transform:uppercase;">استعد للمعركة</div>
        <div style="font-family:'Orbitron',sans-serif;font-size:clamp(100px,25vw,200px);font-weight:900;color:${count<=2?'#e63946':count===3?'#f4a261':'#ffd700'};
          text-shadow:0 0 60px ${count<=2?'#e63946':count===3?'#f4a261':'#ffd700'},0 0 120px ${count<=2?'rgba(230,57,70,.4)':'rgba(255,215,0,.3)'};
          animation:cdPulse .4s ease-out;line-height:1;">${count}</div>
        <div style="display:flex;gap:8px;justify-content:center;margin-top:20px;">
          ${[5,4,3,2,1].map(n=>`<div style="width:12px;height:12px;border-radius:50%;background:${n>=count?'var(--accent)':'#333'};transition:all .3s;"></div>`).join('')}
        </div>
      </div>`;
  };
  const go=()=>{
    if(!document.body.contains(ov)) return;
    ov.innerHTML=`<div style="text-align:center;animation:cdPulse .3s ease-out;"><div style="font-family:'Orbitron',sans-serif;font-size:clamp(60px,15vw,120px);font-weight:900;color:#00ff41;text-shadow:0 0 60px #00ff41;">انطلق! 🚀</div></div>`;
    setTimeout(()=>{ov.remove();cb();},600);
  };
  render();
  const iv=setInterval(()=>{
    count--;
    if(count===0){clearInterval(iv);setTimeout(go,200);}
    else render();
  },1000);
  // Add CSS animation
  if(!document.getElementById('cd-style')){
    const s=document.createElement('style');s.id='cd-style';
    s.textContent='@keyframes cdPulse{from{transform:scale(1.4);opacity:0;}to{transform:scale(1);opacity:1;}}';
    document.head.appendChild(s);
  }
}

function startEventGame(eventId,gameId){
  activeEventId=eventId; activeGameWon=false;
  const game=GAMES_LIST.find(g=>g.id===gameId);
  if(!game) return;
  // Show rules first
  document.getElementById('modal').innerHTML=`
    <div class="modal-box" style="max-width:480px;">
      <h3 style="color:var(--accent);font-family:var(--font-brand);">${game.name}</h3>
      <p style="color:var(--text2);margin-bottom:14px;">${esc(game.desc)}</p>
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:16px;white-space:pre-line;font-size:13px;line-height:1.8;">${esc(game.rules)}</div>
      <div class="modal-actions">
        <button class="btn-primary" onclick="closeModal();showCinematicCountdown(()=>launchGame('${gameId}'))">🚀 ابدأ الآن!</button>
        <button class="btn-ghost" onclick="closeModal()">إلغاء</button>
      </div>
    </div>`;
  document.getElementById('modal').style.display='flex';
}

async function gameWon(score){
  if(activeGameWon||!activeEventId) return;
  activeGameWon=true;
  // Check if already has winner
  const evSnap=await getDoc(doc(db,'events',activeEventId));
  const ev=evSnap.data();
  if(ev.winners?.length>0){showToast('😔 شخص آخر فاز قبلك!','warning');return;}
  // Register win
  await updateDoc(doc(db,'events',activeEventId),{
    winners:[currentUserData.uid],
    winnerName:currentUserData.nickname||currentUserData.name,
    status:'ended'
  });
  // Give prize
  if(ev.prizeId){
    const prize=EVENT_PRIZES.find(p=>p.id===ev.prizeId);
    await givePrize(prize);
  }
  // Add event points
  const et=EVENT_TYPES[ev.type]||EVENT_TYPES.mini;
  const ptRef=doc(db,'event_points',currentUserData.uid);
  const ptSnap=await getDoc(ptRef);
  const cur=ptSnap.exists()?ptSnap.data():{uid:currentUserData.uid,name:currentUserData.nickname||currentUserData.name,points:0};
  await setDoc(ptRef,{...cur,points:(cur.points||0)+et.points,name:currentUserData.nickname||currentUserData.name});
  // Announce
  await push(ref(rtdb,'public_chat'),{
    text:`🏆 ${currentUserData.nickname||currentUserData.name} فاز في فعالية "${ev.title||'لعبة'}" وحصل على ${et.points} نقطة!`,
    uid:'system',name:'🤖 النظام',nickname:'النظام',avatar:'',reactions:{},timestamp:Date.now()
  });
  showGameWinScreen(et,score);
}

async function givePrize(prize){
  if(!prize) return;
  const ud=doc(db,'users',currentUserData.uid);
  if(prize.type==='theme'){
    const perms=(currentUserData.permissions||{});
    perms[prize.value+'_unlocked']=true;
    await updateDoc(ud,{permissions:perms});
    currentUserData.permissions=perms;
    showToast(`🎉 فتحت ثيم ${prize.name}!`,'success');
  } else if(prize.type==='rank'){
    await updateDoc(ud,{rank:prize.value});
    currentUserData.rank=prize.value;
    showToast(`🎉 حصلت على رانك ${prize.name}!`,'success');
  } else if(prize.type==='points'){
    const ptRef=doc(db,'event_points',currentUserData.uid);
    const ptSnap=await getDoc(ptRef);
    const cur=ptSnap.exists()?ptSnap.data():{points:0};
    await setDoc(ptRef,{...cur,uid:currentUserData.uid,name:currentUserData.nickname||currentUserData.name,points:(cur.points||0)+prize.value});
  }
}

function spawnConfettiPiece(color){
  const c=document.createElement('div');

    const s=document.createElement('style');s.id='cf-style';
    s.textContent='@keyframes confettiFall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}';

  setTimeout(()=>c.remove(),3500);
}

// ── LAUNCH SPECIFIC GAMES ──
function launchGame(gameId){
  const fns={wordle:launchWordle,minesweeper:launchMinesweeper,memory:launchMemory,
    tictactoe:launchTicTacToe,reaction:launchReaction,math:launchMath,
    snake:launchSnake,typing:launchTyping,color_match:launchColorMatch,
    number:launchNumberMemory,quiz:launchQuiz,trivia_ar:launchTriviaAr};
  if(fns[gameId]) fns[gameId]();
  else showToast('اللعبة قيد التطوير!','info');
}

const WORDLE_WORDS=['سلام','كتاب','نهار','قلوب','ليلة','صباح','نجوم','شمعة','رياح','بحار','طريق','زمان','جبال','سماء','بيوت','حلوة','أخضر','أبيض','لغات','عيون'];
function launchWordle(){
  const word=WORDLE_WORDS[Math.floor(Math.random()*WORDLE_WORDS.length)];
  let guesses=[],current='',gameOver=false;

      </div>`;
    window._wordleState={word,guesses,current,gameOver,MAX,LEN,render};
  }
  window.wordleKey=function(k){
    const st=window._wordleState; if(st.gameOver) return;
    if(k==='DEL'){st.current=[...st.current].slice(0,-1).join('');st.render();return;}
    if(k==='ENTER'){
      const g=[...st.current];
      if(g.length!==st.LEN){document.getElementById('wordle-msg').textContent='الكلمة يجب أن تكون 5 أحرف!';return;}

    if([...st.current].length<st.LEN){st.current+=k;st.render();}
  };

}

// ───────────── MINESWEEPER ─────────────
function launchMinesweeper(){
  const ROWS=9,COLS=9,MINES=10;
  let board=[],revealed=[],flagged=[],gameOver=false,startTime=null;
  function init(){
    board=Array(ROWS).fill(0).map(()=>Array(COLS).fill(0));
    revealed=Array(ROWS).fill(0).map(()=>Array(COLS).fill(false));
    flagged=Array(ROWS).fill(0).map(()=>Array(COLS).fill(false));
    let placed=0;
    while(placed<MINES){const r=Math.floor(Math.random()*ROWS),c=Math.floor(Math.random()*COLS);if(!board[r][c]){board[r][c]=-1;placed++;}}
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(board[r][c]!==-1){
      let cnt=0;for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){const nr=r+dr,nc=c+dc;if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&board[nr][nc]===-1)cnt++;}board[r][c]=cnt;
    }
  }
  function countColors(){return['','#4488ff','#44aa44','#ff4444','#000088','#880000','#008888','#000000','#888888'];}
  function reveal(r,c){
    if(r<0||r>=ROWS||c<0||c>=COLS||revealed[r][c]||flagged[r][c]) return;
    revealed[r][c]=true;
    if(board[r][c]===0) for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++) reveal(r+dr,c+dc);
  }
  function render(){
    const safe=ROWS*COLS-MINES;
    const revCount=revealed.flat().filter(Boolean).length;
    document.getElementById('main-content').innerHTML=`
      <div class="section-header"><span>💣</span> Minesweeper</div>
      <div style="text-align:center;">
        <div style="margin-bottom:10px;font-size:13px;color:var(--text2);">💣 ${MINES} ألغام | ✅ ${revCount}/${safe}</div>
        <div id="ms-grid" style="display:inline-grid;grid-template-columns:repeat(${COLS},1fr);gap:2px;background:var(--bg3);padding:8px;border-radius:8px;border:1px solid var(--border);">
          ${board.map((row,r)=>row.map((cell,c)=>{
            const rev=revealed[r][c],fl=flagged[r][c];
            let bg=rev?'var(--bg2)':'var(--bg3)',col=countColors()[cell]||'var(--text)',txt='';
            if(rev&&cell===-1){bg='#e63946';txt='💣';}
            else if(rev&&cell>0) txt=cell;
            else if(!rev&&fl) txt='🚩';
            return `<div onclick="msClick(${r},${c})" oncontextmenu="event.preventDefault();msFlag(${r},${c})" style="width:30px;height:30px;background:${bg};border:1px solid ${rev?'rgba(255,255,255,.05)':'var(--border)'};border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:${rev&&cell>0?'14px':'16px'};font-weight:700;color:${col};cursor:pointer;user-select:none;">${txt}</div>`;
          }).join('')).join('')}
        </div>
        ${gameOver?`<div style="margin-top:12px;"><button class="btn-primary btn-sm" onclick="launchMinesweeper()">🔄 إعادة</button></div>`:''}
      </div>`;
    window._msState={board,revealed,flagged,gameOver,ROWS,COLS,MINES,render,safe,revCount};
  }
  window.msClick=function(r,c){
    const st=window._msState; if(st.gameOver||st.revealed[r][c]||st.flagged[r][c]) return;
    if(!startTime) startTime=Date.now();
    reveal(r,c);
    if(board[r][c]===-1){gameOver=true;for(let rr=0;rr<ROWS;rr++)for(let cc=0;cc<COLS;cc++)if(board[rr][cc]===-1)revealed[rr][cc]=true;render();showToast('💥 انفجرت!','error');return;}
    const safe=ROWS*COLS-MINES; const revCount=revealed.flat().filter(Boolean).length;
    if(revCount>=safe){gameOver=true;render();const t=((Date.now()-startTime)/1000).toFixed(1);gameWon(`${t} ثانية`);}
    else render();
  };
  window.msFlag=function(r,c){
    const st=window._msState; if(st.gameOver||st.revealed[r][c]) return;
    flagged[r][c]=!flagged[r][c]; render();
  };
  init(); render();
}

function launchMemory(){
  const emojis=['🔥','💎','⭐','🌙','🦋','🌺','🎯','🏆'];
  let cards=[...emojis,...emojis].sort(()=>Math.random()-.5).map((e,i)=>({id:i,emoji:e,flipped:false,matched:false}));
  let first=null,second=null,lock=false,moves=0,startTime=Date.now();
  function render(){
    document.getElementById('main-content').innerHTML=`
      <div class="section-header"><span>🧩</span> Memory Match</div>
      <div style="text-align:center;max-width:380px;margin:0 auto;">
        <div style="margin-bottom:10px;font-size:13px;color:var(--text2);">🎯 ${moves} حركة</div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">
          ${cards.map(c=>`
            <div onclick="memClick(${c.id})" style="aspect-ratio:1;background:${c.matched?'rgba(0,204,102,.2)':c.flipped?'var(--bg3)':'var(--bg2)'};border:2px solid ${c.matched?'#00cc66':c.flipped?'var(--accent)':'var(--border)'};border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;transition:all .2s;">
              ${c.flipped||c.matched?c.emoji:''}
            </div>`).join('')}
        </div>
      </div>`;
    window._memState={cards,first,second,lock,moves,render};
  }
  window.memClick=function(id){
    const st=window._memState; if(st.lock) return;
    const c=cards.find(x=>x.id===id); if(!c||c.flipped||c.matched) return;
    c.flipped=true; moves++;
    if(!first){first=c;render();return;}
    second=c;lock=true;render();
    if(first.emoji===second.emoji){first.matched=second.matched=true;first=second=null;lock=false;
      if(cards.every(c=>c.matched)){const t=((Date.now()-startTime)/1000).toFixed(1);render();gameWon(`${t}ث — ${moves} حركة`);}
      else render();
    } else {
      setTimeout(()=>{first.flipped=second.flipped=false;first=second=null;lock=false;render();},900);
    }
  };
  render();
}

// ───────────── TIC TAC TOE ─────────────
function launchTicTacToe(){
  let board=Array(9).fill(''),gameOver=false,wins=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  function checkWin(b,p){return wins.some(w=>w.every(i=>b[i]===p));}
  function minimax(b,depth,isMax){
    if(checkWin(b,'O')) return 10-depth; if(checkWin(b,'X')) return depth-10;
    if(b.every(c=>c)) return 0;
    const moves=b.map((c,i)=>c===''?i:-1).filter(i=>i>=0);
    if(isMax){let best=-Infinity;moves.forEach(i=>{b[i]='O';best=Math.max(best,minimax(b,depth+1,false));b[i]='';});return best;}
    else{let best=Infinity;moves.forEach(i=>{b[i]='X';best=Math.min(best,minimax(b,depth+1,true));b[i]='';});return best;}
  }
  function aiMove(){
    let best=-Infinity,move=0;
    board.forEach((c,i)=>{if(c===''){board[i]='O';const s=minimax(board,0,false);board[i]='';if(s>best){best=s;move=i;}}});
    board[move]='O';
  }
  function render(){
    document.getElementById('main-content').innerHTML=`
      <div class="section-header"><span>⭕</span> Tic Tac Toe vs AI</div>
      <div style="text-align:center;max-width:280px;margin:0 auto;">
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px;">
          ${board.map((c,i)=>`<div onclick="tttClick(${i})" style="aspect-ratio:1;background:var(--bg3);border:2px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:36px;cursor:pointer;transition:all .15s;color:${c==='X'?'var(--accent)':'#aaa'}">${c}</div>`).join('')}
        </div>
        <div id="ttt-msg" style="font-size:14px;color:var(--text2);min-height:24px;"></div>
        ${gameOver?`<button class="btn-primary btn-sm" onclick="launchTicTacToe()" style="margin-top:10px;">🔄 إعادة</button>`:''}
      </div>`;
    window._tttState={board,gameOver,render};
  }
  window.tttClick=function(i){
    const st=window._tttState; if(st.gameOver||st.board[i]) return;
    board[i]='X';
    if(checkWin(board,'X')){gameOver=true;render();document.getElementById('ttt-msg').textContent='🏆 فزت!';gameWon('هزمت الذكاء الاصطناعي!');return;}
    if(board.every(c=>c)){gameOver=true;render();document.getElementById('ttt-msg').textContent='🤝 تعادل!';return;}
    aiMove();
    if(checkWin(board,'O')){gameOver=true;render();document.getElementById('ttt-msg').textContent='😔 خسرت، حاول مرة أخرى!';return;}
    if(board.every(c=>c)){gameOver=true;render();document.getElementById('ttt-msg').textContent='🤝 تعادل!';}
    else render();
  };
  render();
}

// ───────────── SNAKE ─────────────
function launchSnake(){
  const SZ=20,GRID=15;let snake=[{x:7,y:7}],dir={x:1,y:0},food={x:12,y:7},score=0,alive=true,iv=null;
  function placeFood(){do{food={x:Math.floor(Math.random()*GRID),y:Math.floor(Math.random()*GRID)};}while(snake.some(s=>s.x===food.x&&s.y===food.y));}
  function step(){
    if(!alive) return;
    const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
    if(head.x<0||head.x>=GRID||head.y<0||head.y>=GRID||snake.some(s=>s.x===head.x&&s.y===head.y)){alive=false;clearInterval(iv);render();gameWon(`${score} نقطة`);return;}
    snake.unshift(head);
    if(head.x===food.x&&head.y===food.y){score++;placeFood();}else snake.pop();
    render();
  }
  function render(){
    document.getElementById('main-content').innerHTML=`
      <div class="section-header"><span>🐍</span> Snake</div>
      <div style="text-align:center;">
        <div style="font-size:13px;color:var(--text2);margin-bottom:8px;">🍎 النقاط: ${score} | طول: ${snake.length}</div>
        <canvas id="snake-canvas" width="${GRID*SZ}" height="${GRID*SZ}" style="border:2px solid var(--border);border-radius:8px;background:var(--bg3);display:block;margin:0 auto;"></canvas>
        <div style="margin-top:12px;display:grid;grid-template-columns:repeat(3,1fr);gap:5px;max-width:160px;margin-left:auto;margin-right:auto;">
          <div></div><button class="btn-ghost btn-sm" onclick="snakeDir(0,-1)">↑</button><div></div>
          <button class="btn-ghost btn-sm" onclick="snakeDir(-1,0)">←</button>
          <button class="btn-ghost btn-sm" onclick="snakeDir(0,1)">↓</button>
          <button class="btn-ghost btn-sm" onclick="snakeDir(1,0)">→</button>
        </div>
        ${!alive?`<div style="margin-top:12px;"><button class="btn-primary btn-sm" onclick="launchSnake()">🔄 إعادة</button></div>`:''}
      </div>`;
    const cv=document.getElementById('snake-canvas'); if(!cv) return;
    const ctx=cv.getContext('2d');
    ctx.clearRect(0,0,GRID*SZ,GRID*SZ);
    snake.forEach((s,i)=>{ctx.fillStyle=i===0?'var(--accent)':'rgba(230,57,70,.6)';ctx.fillRect(s.x*SZ+1,s.y*SZ+1,SZ-2,SZ-2);});
    ctx.fillStyle='#00ff41';ctx.fillRect(food.x*SZ+2,food.y*SZ+2,SZ-4,SZ-4);
  }
  window.snakeDir=function(x,y){if(!alive) return;if(snake.length>1&&x===-dir.x&&y===-dir.y) return;dir={x,y};};
  document.addEventListener('keydown',function snakeKeys(e){
    const k={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0}};
    if(k[e.key]){e.preventDefault();window.snakeDir(k[e.key].x,k[e.key].y);}
  });
  render();
  iv=setInterval(step,180);
}

    next();
    window._cmState={cur,score,total,render};

  };
  render();
}
